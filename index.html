<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Análise 360° Pro — Dashboard Comercial</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:hsl(220,18%,97%);--fg:hsl(220,25%,12%);--card:hsl(0,0%,100%);
  --primary:hsl(224,71%,50%);--primary-fg:#fff;--primary-glow:hsla(224,71%,50%,.35);
  --secondary:hsl(220,14%,91%);--muted:hsl(220,14%,91%);--muted-fg:hsl(215,14%,48%);
  --accent:hsl(220,14%,88%);--border:hsl(220,13%,87%);--ring:hsl(224,71%,50%);
  --success:hsl(142,71%,35%);--success-light:hsla(142,71%,35%,.12);--success-glow:hsla(142,71%,45%,.4);
  --warning:hsl(38,92%,45%);--warning-light:hsla(38,92%,45%,.12);
  --danger:hsl(4,86%,48%);--danger-light:hsla(4,86%,48%,.12);--danger-glow:hsla(4,86%,58%,.4);
  --surface:hsl(220,14%,94%);--chart-text:hsl(220,14%,40%);--chart-grid:hsl(220,13%,87%);
  --radius:.875rem;--radius-sm:.5rem;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.06);
  --shadow-lg:0 10px 40px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.08);
  --shadow-p:0 6px 24px var(--primary-glow);
  --shadow-s:0 6px 20px var(--success-glow);
}
.dark{
  --bg:hsl(224,20%,10%);--fg:hsl(215,25%,92%);--card:hsl(224,18%,14%);
  --primary:hsl(224,80%,62%);--primary-glow:hsla(224,80%,62%,.4);
  --secondary:hsl(224,15%,20%);--muted:hsl(224,15%,20%);--muted-fg:hsl(215,14%,58%);
  --accent:hsl(224,15%,25%);--border:hsl(224,14%,22%);
  --success:hsl(142,60%,45%);--success-light:hsla(142,60%,45%,.15);--success-glow:hsla(142,60%,50%,.45);
  --warning:hsl(38,85%,55%);--warning-light:hsla(38,85%,55%,.15);
  --danger:hsl(4,80%,55%);--danger-light:hsla(4,80%,55%,.15);--danger-glow:hsla(4,80%,60%,.45);
  --surface:hsl(224,18%,17%);--chart-text:hsl(215,18%,72%);--chart-grid:hsl(224,14%,25%);
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);--shadow-lg:0 10px 40px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased}
.mono{font-family:'Geist Mono','SF Mono',monospace;font-feature-settings:'tnum';font-variant-numeric:tabular-nums}
input,button,select{font-family:inherit}
.max-w{max-width:1360px;margin:0 auto;padding:0 1.5rem}
main{max-width:1360px;margin:0 auto;padding:2rem 1.5rem}
.grid{display:grid}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}.hide-mob{display:none!important}}
.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}.gap-5{gap:1.25rem}.gap-6{gap:1.5rem}
.flex{display:flex}.items-c{align-items:center}.jc-sb{justify-content:space-between}.f-wrap{flex-wrap:wrap}
.space-y>*+*{margin-top:1.5rem}.ox{overflow-x:auto}
/* HEADER */
header{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--card) 88%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.h-inner{max-width:1360px;margin:0 auto;padding:.625rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{width:2.5rem;height:2.5rem;border-radius:.75rem;background:linear-gradient(135deg,var(--primary),hsl(250,70%,60%));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-p);flex-shrink:0}
.logo svg{width:1.2rem;height:1.2rem;color:#fff}
.brand h1{font-size:.95rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:.4rem;line-height:1.2}
.badge-pro{font-size:.55rem;font-weight:700;background:linear-gradient(135deg,var(--primary),hsl(250,70%,60%));color:#fff;padding:.15rem .5rem;border-radius:999px;letter-spacing:.08em;text-transform:uppercase}
.brand p{font-size:.65rem;color:var(--muted-fg)}
/* BUTTONS */
button{cursor:pointer;border:none;background:none;font-family:inherit;transition:all .18s cubic-bezier(.4,0,.2,1);outline:none}
button:not(:disabled):active{transform:scale(.96)}
.btn-p{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1rem;border-radius:.625rem;background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%));color:#fff;font-size:.75rem;font-weight:600;box-shadow:var(--shadow-p);position:relative;overflow:hidden}
.btn-p::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);opacity:0;transition:opacity .18s}
.btn-p:hover:not(:disabled)::before{opacity:1}
.btn-p:hover:not(:disabled){box-shadow:0 8px 30px var(--primary-glow);transform:translateY(-1px)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-s{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1rem;border-radius:.625rem;background:linear-gradient(135deg,var(--success),hsl(160,65%,40%));color:#fff;font-size:.75rem;font-weight:600;box-shadow:var(--shadow-s)}
.btn-s:hover:not(:disabled){box-shadow:0 8px 28px var(--success-glow);transform:translateY(-1px)}
.btn-g{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1rem;border-radius:.625rem;background:var(--secondary);color:var(--fg);font-size:.75rem;font-weight:500;border:1px solid var(--border)}
.btn-g:hover:not(:disabled){background:var(--accent)}
.btn-i{width:2.1rem;height:2.1rem;border-radius:.6rem;display:inline-flex;align-items:center;justify-content:center;background:var(--secondary);color:var(--muted-fg);flex-shrink:0}
.btn-i:hover{background:var(--accent);color:var(--fg)}
.btn-i.out:hover{background:var(--danger-light);color:var(--danger)}
.btn-i svg{width:1rem;height:1rem}
.btn-proc{width:100%;padding:1rem;border-radius:var(--radius);background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%),hsl(280,65%,60%));background-size:200% 200%;color:#fff;font-weight:700;font-size:.925rem;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.6rem;box-shadow:var(--shadow-p);animation:gradShift 4s ease infinite;position:relative;overflow:hidden}
.btn-proc::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:translateX(-100%)}
.btn-proc:hover:not(:disabled)::after{animation:shimmer .8s ease}
.btn-proc:hover:not(:disabled){box-shadow:0 12px 40px var(--primary-glow);transform:translateY(-2px)}
.btn-proc:disabled{opacity:.35;cursor:not-allowed;transform:none;animation:none;box-shadow:none}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes shimmer{to{transform:translateX(100%)}}
.btn-auth{width:100%;padding:.7rem;border-radius:.625rem;background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%));color:#fff;font-weight:600;font-size:.875rem;font-family:inherit;box-shadow:var(--shadow-p)}
.btn-auth:hover:not(:disabled){box-shadow:0 8px 30px var(--primary-glow);transform:translateY(-1px)}
.btn-auth:disabled{opacity:.5;cursor:not-allowed;transform:none}
/* VIEW TABS */
.vtabs{display:flex;background:var(--surface);border-radius:.6rem;padding:.2rem;gap:.15rem;flex-wrap:wrap}
.vtab{padding:.4rem .75rem;border-radius:.45rem;font-size:.72rem;font-weight:500;color:var(--muted-fg);white-space:nowrap}
.vtab.on{background:var(--card);color:var(--fg);box-shadow:var(--shadow-sm);font-weight:600}
.vtab:hover:not(.on){color:var(--fg)}
/* TAB REAIS/UNID */
.tbtn{display:flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;border-radius:.75rem;font-weight:600;font-size:.875rem;border:1.5px solid var(--border);color:var(--muted-fg);background:var(--card);position:relative}
.tbtn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.tbtn.on-r{background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%));color:#fff;border-color:transparent;box-shadow:var(--shadow-p)}
.tbtn.on-u{background:linear-gradient(135deg,var(--success),hsl(160,65%,40%));color:#fff;border-color:transparent;box-shadow:var(--shadow-s)}
.tbtn:disabled{opacity:.4;cursor:not-allowed}
.tbtn svg{width:1rem;height:1rem;flex-shrink:0}
/* SEG NAV */
.seg{display:flex;background:var(--surface);border-radius:.75rem;padding:.25rem;gap:.2rem}
.seg-b{padding:.5rem 1.1rem;border-radius:.55rem;font-size:.78rem;font-weight:600;color:var(--muted-fg);white-space:nowrap;display:flex;align-items:center;gap:.35rem}
.seg-b.on{background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%));color:#fff;box-shadow:var(--shadow-p)}
.seg-b:hover:not(.on){color:var(--fg)}
.seg-b svg{width:.85rem;height:.85rem}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shadow-md)}
.card-h:hover{transform:translateY(-3px)}
/* KPI */
.kpi{border-radius:var(--radius);padding:1.25rem;border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:all .2s}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;right:0;width:5rem;height:5rem;border-radius:50%;opacity:.07;transform:translate(30%,-30%)}
.kpi.ks{border-color:hsla(142,71%,35%,.25);background:linear-gradient(135deg,var(--card),var(--success-light))}.kpi.ks::before{background:var(--success)}
.kpi.kw{border-color:hsla(38,92%,45%,.25);background:linear-gradient(135deg,var(--card),var(--warning-light))}.kpi.kw::before{background:var(--warning)}
.kpi.kd{border-color:hsla(4,86%,48%,.25);background:linear-gradient(135deg,var(--card),var(--danger-light))}.kpi.kd::before{background:var(--danger)}
.kl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-fg)}
.kv{font-size:1.75rem;font-weight:800;margin:.4rem 0 0;line-height:1;letter-spacing:-.02em}
.ks2{font-size:.67rem;color:var(--muted-fg);margin-top:.35rem}
.kbar{height:.25rem;background:var(--muted);border-radius:2px;margin-top:.75rem;overflow:hidden}
.kbar-f{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
/* REP CARD */
.rep-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow-sm);transition:all .25s;position:relative;overflow:hidden}
.rep-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.rep-card.bl::before{background:linear-gradient(180deg,var(--success),hsl(160,65%,50%))}
.rep-card.at::before{background:linear-gradient(180deg,var(--danger),hsl(4,86%,60%))}
.rep-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.rnk{width:1.75rem;height:1.75rem;border-radius:.5rem;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0}
.rnk.gold{background:linear-gradient(135deg,hsl(42,95%,55%),hsl(35,95%,45%));color:#fff;box-shadow:0 3px 12px hsla(42,95%,50%,.5)}
.rnk.silver{background:linear-gradient(135deg,hsl(220,20%,70%),hsl(220,15%,55%));color:#fff}
.rnk.bronze{background:linear-gradient(135deg,hsl(25,65%,55%),hsl(25,65%,42%));color:#fff}
.rnk.other{background:var(--surface);color:var(--muted-fg)}
.cob-tr{height:.45rem;background:var(--muted);border-radius:4px;overflow:hidden;margin:.5rem 0}
.cob-f{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.ms{background:var(--surface);border-radius:.5rem;padding:.5rem .65rem}
.ms-l{font-size:.6rem;color:var(--muted-fg)}.ms-v{font-size:.8rem;font-weight:700;margin-top:.1rem}
/* TABLES */
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse;font-size:.72rem}
thead tr{background:var(--surface);border-bottom:1px solid var(--border)}
th{padding:.75rem 1rem;color:var(--muted-fg);font-weight:600;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
th.r,td.r{text-align:right}th.c,td.c{text-align:center}
td{padding:.75rem 1rem;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);transition:background .12s}
tr:last-child td{border-bottom:none}
tr:hover td{background:color-mix(in srgb,var(--primary) 4%,transparent)}
/* UPLOAD */
.uz{position:relative;cursor:pointer;border:2px dashed var(--border);border-radius:var(--radius);padding:2.5rem 1.5rem;text-align:center;transition:all .25s;background:var(--card)}
.uz:hover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 4%,var(--card));box-shadow:0 0 0 4px var(--primary-glow)}
.uz.done{border-color:var(--success);border-style:solid;background:var(--success-light);box-shadow:0 0 0 3px var(--success-glow)}
.sbadge{position:absolute;top:-.75rem;left:1rem;padding:.12rem .75rem;border-radius:999px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sbadge.pend{background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%));color:#fff}
.sbadge.done{background:linear-gradient(135deg,var(--success),hsl(160,65%,42%));color:#fff}
.u-ico{width:3.5rem;height:3.5rem;border-radius:1rem;background:var(--muted);display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;transition:all .2s}
.uz:hover .u-ico{background:color-mix(in srgb,var(--primary) 15%,var(--muted))}
/* AUTH */
.auth-p{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:radial-gradient(ellipse at 60% 40%,color-mix(in srgb,var(--primary) 8%,transparent),transparent 70%)}
.auth-b{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:2rem;box-shadow:var(--shadow-lg)}
.auth-logo{width:3.5rem;height:3.5rem;border-radius:1rem;background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%));display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:var(--shadow-p)}
.auth-logo svg{width:1.6rem;height:1.6rem;color:#fff}
.if{position:relative}.if svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:1rem;height:1rem;color:var(--muted-fg);pointer-events:none}
.if input{width:100%;padding:.65rem 1rem .65rem 2.4rem;border-radius:.625rem;border:1.5px solid var(--border);background:var(--bg);color:var(--fg);font-size:.875rem;transition:border-color .15s,box-shadow .15s}
.if input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.al{text-align:center;font-size:.72rem;color:var(--muted-fg)}
.al button{font-size:.72rem;color:var(--primary);font-weight:600;text-decoration:underline;text-decoration-color:transparent}
.al button:hover{text-decoration-color:currentColor}
/* CHART */
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow-sm)}
.ct{font-size:1rem;font-weight:700;margin-bottom:.25rem;letter-spacing:-.01em}
.cs{font-size:.72rem;color:var(--muted-fg);margin-bottom:1.25rem;display:flex;flex-wrap:wrap;align-items:center;gap:.5rem}
.dot{display:inline-block;width:.55rem;height:.55rem;border-radius:50%}
/* PRIORITY */
.pr{display:flex;align-items:center;justify-content:space-between;padding:.625rem 0;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent)}
.pr:last-child{border-bottom:none}
/* TOAST */
#tw{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast{pointer-events:all;background:var(--card);border:1.5px solid var(--border);border-radius:.75rem;padding:.75rem 1rem;font-size:.8rem;font-weight:500;min-width:240px;max-width:340px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:.5rem;animation:tIn .25s ease}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{to{opacity:0;transform:translateX(20px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:1rem;height:1rem;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease}
.div{width:1px;height:1.5rem;background:var(--border)}
.ts{color:var(--success)}.td{color:var(--danger)}.tw2{color:var(--warning)}.tm{color:var(--muted-fg)}
.fw8{font-weight:800}.fw7{font-weight:700}.fw6{font-weight:600}
.hero{text-align:center;margin-bottom:2.5rem}
.h-ico{width:5rem;height:5rem;border-radius:1.5rem;background:linear-gradient(135deg,var(--primary),hsl(250,70%,58%),hsl(280,65%,62%));display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:var(--shadow-p),0 0 60px var(--primary-glow)}
.h-ico svg{width:2.4rem;height:2.4rem;color:#fff}
.hero h2{font-size:2rem;font-weight:800;letter-spacing:-.025em}
.hero p{font-size:.875rem;color:var(--muted-fg);margin-top:.5rem;max-width:440px;margin-left:auto;margin-right:auto}
.ldf{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:.75rem;font-size:.875rem;color:var(--muted-fg)}
.dh{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.dh summary{padding:.75rem 1.25rem;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-fg);cursor:pointer;list-style:none;display:flex;align-items:center;gap:.5rem}
.dh summary:hover{color:var(--fg)}
.dh .db{padding:.75rem 1.25rem 1rem;font-size:.67rem;color:var(--muted-fg);font-family:'Geist Mono',monospace;line-height:1.8}
.eb{font-size:.75rem;color:var(--danger);background:var(--danger-light);border:1px solid hsla(4,86%,48%,.2);border-radius:.6rem;padding:.6rem 1rem;text-align:center}
hr{border:none;border-top:1px solid var(--border)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:1024px){.dsk{display:none!important}}
@media(min-width:1025px){.mob{display:none!important}}
</style>
</head>

<div id="app"><div class="ldf"><div class="sp"></div> Carregando...</div></div>

// Formatters
const fc=v=>{const a=Math.abs(v);if(a>=1e6)return`R$ ${(v/1e6).toFixed(1)}M`;if(a>=1000)return`R$ ${(v/1000).toFixed(1)}k`;return`R$ ${v.toFixed(0)}`};
const fn=v=>new Intl.NumberFormat('pt-BR').format(Math.round(v));
const fp=v=>`${(v*100).toFixed(1)}%`;
// Excel helpers
function nrm(n){return String(n).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[_\s.]+/g,' ').trim()}
function fCol(row,names){
  const ks=Object.keys(row),ns=names.map(nrm);
  for(const n of ns)for(const k of ks)if(nrm(k)===n)return row[k];
  for(const n of ns)for(const k of ks)if(nrm(k).includes(n))return row[k];
  return undefined;
}
function toN(v){
  if(v===null||v===undefined||v==='')return 0;
  if(typeof v==='number')return isNaN(v)?0:v;
  let s=String(v).trim().replace(/[¤$€£¥\s]/g,'');
  const lc=s.lastIndexOf(','),ld=s.lastIndexOf('.');
  if(lc>ld)s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');
  const p=parseFloat(s);return isNaN(p)?0:p;
}
function exRow(row,fam,prod){
  return{familia:fam,produto:prod,
    realAA:toN(fCol(row,['REAL. AA','REAL AA'])),cota:toN(fCol(row,['COTA','cota'])),
    realizado:toN(fCol(row,['REALIZADO','realizado'])),cobReal:toN(fCol(row,['COB. REAL','COB REAL'])),
    crescAtual:toN(fCol(row,['CRESC. ATUAL'])),projArred:toN(fCol(row,['PROJ. ARRED','PROJ ARRED'])),
    cobProjArred:toN(fCol(row,['COB. PROJ. ARRED','COB PROJ ARRED'])),crescProj:toN(fCol(row,['CRESC. PROJ.','CRESC PROJ'])),
    repres:toN(fCol(row,['%Repres.','Repres'])),
    deltaCota:toN(fCol(row,['Δ Cota Vs Dem. Proj','Δ  Cota Vs Dem. Proj','Delta Cota','DELTA'])),
    difRealizadoCota:toN(fCol(row,['Diferença Realizado x Cota'])),
  };
}
function parseProdSheet(wb){
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(sheet,{defval:0});
  const rows=[];let cur='';
  for(const row of raw){
    const fv=String(Object.values(row)[0]??'');
    if(fv.toLowerCase().includes('filtros aplicados')||fv.toLowerCase().includes('meses é'))continue;
    const fam=String(fCol(row,['FAMILIA','familia'])??'').trim();
    const prod=String(fCol(row,['NM_FAMILIA_PP','nm familia pp','produto'])??'').trim();
    if(fam)cur=fam;
    if(!prod||prod==='Total'){if(prod==='Total')rows.push(exRow(row,cur,'__TOTAL__'));continue}
    const ext=exRow(row,cur,prod);if(ext.cota===0)continue;rows.push(ext);
  }
  return rows;
}
function parseRepSheet(wb){
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(sheet,{defval:0});
  const reps=[];
  for(const row of raw){
    const terr=String(fCol(row,['TERRITORIO','territorio'])??'').trim();
    if(!terr||terr.toLowerCase()==='total'||terr.toLowerCase().includes('filtros'))continue;
    const cota=toN(fCol(row,['COTA','cota']));if(cota===0)continue;
    let code='',name=terr;const m=terr.match(/^(\d+)\s*-\s*(.+)$/);if(m){code=m[1];name=m[2].trim()}
    reps.push({codigo:code,nome:name,territorio:terr,
      realAA:toN(fCol(row,['REAL. AA','REAL AA'])),cota,realizado:toN(fCol(row,['REALIZADO','realizado'])),
      cobReal:toN(fCol(row,['COB. REAL','COB REAL'])),crescAtual:toN(fCol(row,['CRESC. ATUAL'])),
      projArred:toN(fCol(row,['PROJ. ARRED','PROJ ARRED'])),cobProjArred:toN(fCol(row,['COB. PROJ. ARRED','COB PROJ ARRED'])),
      crescProj:toN(fCol(row,['CRESC. PROJ.'])),repres:toN(fCol(row,['%Repres.'])),
      deltaCota:toN(fCol(row,['Δ Cota Vs Dem. Proj','Δ  Cota Vs Dem. Proj','DELTA'])),
      difRealizadoCota:toN(fCol(row,['Diferença Realizado x Cota'])),
    });
  }
  reps.sort((a,b)=>b.cobProjArred-a.cobProjArred);
  return reps;
}
function processFiles(vBuf,uBuf){
  const vWb=XLSX.read(vBuf,{type:'array'}),uWb=XLSX.read(uBuf,{type:'array'});
  const vSheet=vWb.Sheets[vWb.SheetNames[0]];
  const fr=XLSX.utils.sheet_to_json(vSheet,{defval:0})[0]||{};
  const isRep=Object.keys(fr).some(k=>nrm(k).includes('territorio'));
  if(isRep){
    const vR=parseRepSheet(vWb),uR=parseRepSheet(uWb);
    const reps=vR.map(vr=>{
      const ur=uR.find(r=>r.codigo===vr.codigo)||vr;
      return{...vr,uni:{realAA:ur.realAA,cota:ur.cota,realizado:ur.realizado,cobReal:ur.cobReal,projArred:ur.projArred,cobProjArred:ur.cobProjArred,deltaCota:ur.deltaCota}};
    });
    const tV={cota:0,realizado:0,projArred:0,deltaCota:0,cobProjArred:0};
    const tU={cota:0,realizado:0,projArred:0,deltaCota:0,cobProjArred:0};
    vR.forEach(r=>{tV.cota+=r.cota;tV.realizado+=r.realizado;tV.projArred+=r.projArred;tV.deltaCota+=r.deltaCota});
    uR.forEach(r=>{tU.cota+=r.cota;tU.realizado+=r.realizado;tU.projArred+=r.projArred;tU.deltaCota+=r.deltaCota});
    tV.cobProjArred=tV.cota>0?tV.projArred/tV.cota:0;tU.cobProjArred=tU.cota>0?tU.projArred/tU.cota:0;
    return{type:'rep',reps,totalValor:tV,totalUnidades:tU};
  }
  const vRows=parseProdSheet(vWb),uRows=parseProdSheet(uWb);
  const vP=vRows.filter(r=>r.produto!=='__TOTAL__'),uP=uRows.filter(r=>r.produto!=='__TOTAL__');
  const fams=new Set(vRows.filter(r=>r.produto==='__TOTAL__').map(r=>r.familia));
  const sums=[];
  for(const fam of fams){
    const vt=vRows.find(r=>r.familia===fam&&r.produto==='__TOTAL__');
    const ut=uRows.find(r=>r.familia===fam&&r.produto==='__TOTAL__');
    if(!vt||!ut)continue;
    const fvp=vRows.filter(r=>r.familia===fam&&r.produto!=='__TOTAL__');
    const fup=uRows.filter(r=>r.familia===fam&&r.produto!=='__TOTAL__');
    const prods=fvp.map(vp=>{
      const up=fup.find(u=>u.produto===vp.produto)||{...vp,cota:0,realizado:0,cobReal:0,projArred:0,cobProjArred:0,deltaCota:0};
      return{nome:vp.produto.replace(/_$/,'').replace(/ HYQ$/,'').trim(),valor:vp,unidades:up,status:vp.deltaCota>=0?'blindar':'atuar'};
    });
    sums.push({familia:fam,valor:{realAA:vt.realAA,cota:vt.cota,realizado:vt.realizado,cobReal:vt.cobReal,projArred:vt.projArred,cobProjArred:vt.cobProjArred,deltaCota:vt.deltaCota,difRealizadoCota:vt.difRealizadoCota},unidades:{realAA:ut.realAA,cota:ut.cota,realizado:ut.realizado,cobReal:ut.cobReal,projArred:ut.projArred,cobProjArred:ut.cobProjArred,deltaCota:ut.deltaCota,difRealizadoCota:ut.difRealizadoCota},produtos:prods,status:vt.deltaCota>=0?'blindar':'atuar'});
  }
  sums.sort((a,b)=>{if(a.status==='atuar'&&b.status==='blindar')return-1;if(a.status==='blindar'&&b.status==='atuar')return 1;return a.valor.deltaCota-b.valor.deltaCota});
  const tV={cota:0,realizado:0,projArred:0,deltaCota:0,cobProjArred:0};
  const tU={cota:0,realizado:0,projArred:0,deltaCota:0,cobProjArred:0};
  sums.forEach(s=>{tV.cota+=s.valor.cota;tV.realizado+=s.valor.realizado;tV.projArred+=s.valor.projArred;tV.deltaCota+=s.valor.deltaCota;tU.cota+=s.unidades.cota;tU.realizado+=s.unidades.realizado;tU.projArred+=s.unidades.projArred;tU.deltaCota+=s.unidades.deltaCota});
  tV.cobProjArred=tV.cota>0?tV.projArred/tV.cota:0;tU.cobProjArred=tU.cota>0?tU.projArred/tU.cota:0;
  return{type:'product',familias:sums,valorRows:vP,unidadesRows:uP,totalValor:tV,totalUnidades:tU};
}

async function doProc(){
  if(!vFile||!uFile)return;loading=true;err=null;render();

    const[vB,uB]=await Promise.all([vFile.arrayBuffer(),uFile.arrayBuffer()]);
    dashData=processFiles(vB,uB);
    section=dashData.type==='rep'?'rep':'produto';
    try{await saveDash(dashData);toast('Análise salva!','success')}catch(e){toast('Processado mas erro ao salvar.','error')}

  finally{loading=false;render()}
}

// KPI helper
function kpi(title,val,sub,type='',pct=0,bar=false){
  const cls={success:'ks',warning:'kw',danger:'kd','':''}[type]||'';
  const tc={success:'var(--success)',warning:'var(--warning)',danger:'var(--danger)','':'var(--fg)'}[type]||'var(--fg)';
  const bc={success:'var(--success)',warning:'var(--warning)',danger:'var(--danger)','':'var(--primary)'}[type]||'var(--primary)';
  return`<div class="kpi ${cls}">
    <div class="kl">${title}</div>
    <div class="kv mono ${type==='danger'?'pulse':''}" style="color:${tc}">${val}</div>
    ${sub?`<div class="ks2 mono">${sub}</div>`:''}
    ${bar?`<div class="kbar"><div class="kbar-f" style="width:${Math.min(pct*100,100)}%;background:${bc}"></div></div>`:''}
  </div>`;
}

function rPodium(reps,isR,fmt){
  if(reps.length<1)return'';
  const sorted=[...reps].sort((a,b)=>(isR?b.cobProjArred:b.uni?.cobProjArred||0)-(isR?a.cobProjArred:a.uni?.cobProjArred||0));

  const emo=['🥇','🥈','🥉'],rst=['gold','silver','bronze'];
  return`<div style="background:linear-gradient(135deg,var(--card),var(--surface));border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow-sm)">

    ${top.map((r,i)=>{
      const cob=isR?r.cobProjArred:r.uni?.cobProjArred||0;
      const delta=isR?r.deltaCota:r.uni?.deltaCota||0;
      return`<div style="background:var(--card);border:1px solid ${i===0?'hsla(42,95%,50%,.4)':'var(--border)'};border-radius:var(--radius-sm);padding:1rem;text-align:center;position:relative;${i===0?'box-shadow:0 4px 20px hsla(42,95%,50%,.2)':''}">
        <div style="position:absolute;top:.5rem;right:.5rem;font-size:1.1rem">${emo[i]}</div>
        <div class="rnk ${rst[i]}" style="width:2.5rem;height:2.5rem;border-radius:.75rem;margin:0 auto .75rem;font-size:.85rem">${i+1}</div>
        <div style="font-size:.78rem;font-weight:700;margin-bottom:.5rem;line-height:1.3">${r.nome}</div>
        <div style="font-size:1.5rem;font-weight:800;color:var(--success);font-family:'Geist Mono',monospace;line-height:1">${fp(cob)}</div>
        <div style="font-size:.65rem;color:var(--muted-fg);margin:.3rem 0">Cob. Projetada</div>
        <div style="font-size:.7rem;font-weight:600;font-family:'Geist Mono',monospace;color:${delta>=0?'var(--success)':'var(--danger)'}">Δ ${delta>=0?'+':''}${fmt(delta)}</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}
function rRepCard(r,idx,isR,fmt){

      <div class="ms"><div class="ms-l">Realizado</div><div class="ms-v mono">${fmt(real)}</div><div style="font-size:.62rem;color:${cota>0&&real/cota>=1?'var(--success)':'var(--warning)'}">${cota>0?((real/cota)*100).toFixed(1):0}% cota</div></div>
      <div class="ms"><div class="ms-l">Δ Cota</div><div class="ms-v mono" style="color:${delta>=0?'var(--success)':'var(--danger)'}">${delta>=0?'+':''}${fmt(delta)}</div><div style="font-size:.62rem;color:var(--muted-fg)">vs dem. proj.</div></div>

  </div>`;
}
function rRepTbl(reps,isR,fmt){

        <td class="c" style="font-size:.67rem;font-weight:700;color:${sc(cob)}">${cob>=1?'✅ Batendo':cob>=.7?'⚠️ Atenção':'🚨 Atuar'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}
function rFamView(rows){
  const fams=[...new Set(rows.map(r=>r.familia))];
  const fmt=v=>tab==='reais'?fc(v):fn(v);
  const sC=c=>c>=1?'hsl(142,71%,40%)':c>=.7?'hsl(38,92%,50%)':'hsl(4,86%,52%)';
  const sL=c=>c>=1?'✅ Batendo Meta':c>=.7?'⚠️ Atenção':'🚨 Atuar Urgente';
  const sums=fams.map(fam=>{
    const it=rows.filter(r=>r.familia===fam);
    const tC=it.reduce((s,r)=>s+r.cota,0),tR=it.reduce((s,r)=>s+r.realizado,0),tP=it.reduce((s,r)=>s+r.projArred,0);
    const cob=tC>0?tP/tC:0,delta=it.reduce((s,r)=>s+r.deltaCota,0);
    return{fam,tC,tR,tP,cob,delta,count:it.length};
  });
  return`<div class="grid g3 gap-4">${sums.map(({fam,tC,tR,tP,cob,delta,count})=>{
    const sc=sC(cob),pR=tC>0?(tR/tC)*100:0,pP=cob*100;
    return`<div class="card card-h">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem">
        <span style="font-weight:700">${fam}</span>
        <span style="padding:.15rem .5rem;border-radius:999px;font-size:.6rem;font-weight:700;background:${sc}22;color:${sc}">${sL(cob)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted-fg);margin-bottom:.25rem"><span>Cobertura Projetada</span><span class="mono fw8" style="color:${sc}">${pP.toFixed(1)}%</span></div>
      <div style="height:.45rem;background:var(--muted);border-radius:4px;overflow:hidden;margin-bottom:.875rem"><div style="height:100%;border-radius:4px;background:${sc};width:${Math.min(pP,100)}%;transition:width .6s ease"></div></div>
      <div class="grid g2 gap-2" style="font-size:.72rem">
        <div class="ms"><div class="ms-l">Realizado</div><div class="mono fw7">${fmt(tR)}</div><div style="color:${pR>=100?'var(--success)':'var(--warning)'}">${pR.toFixed(1)}% da cota</div></div>
        <div class="ms"><div class="ms-l">Projeção</div><div class="mono fw7">${fmt(tP)}</div><div style="color:${delta>=0?'var(--success)':'var(--danger)'}">Δ ${delta>=0?'+':''}${fmt(delta)}</div></div>
      </div>
      <p style="font-size:.67rem;color:var(--muted-fg);margin-top:.625rem">${count} produto${count!==1?'s':''}</p>
    </div>`;
  }).join('')}</div>`;
}

        <td class="c" style="font-size:.65rem;font-weight:700;color:${sc(row.cobProjArred)}">${row.cobProjArred>=1?'✅':row.cobProjArred>=.7?'⚠️':'🚨'}</td>

}
function rCobChart(rows){return`<div class="cc"><div class="ct">Cobertura Projetada por Produto</div><div class="cs"><span class="dot" style="background:hsl(142,71%,42%)"></span>≥100% <span style="margin:0 .4rem">|</span><span class="dot" style="background:hsl(38,92%,52%)"></span>70–99% <span style="margin:0 .4rem">|</span><span class="dot" style="background:hsl(4,86%,54%)"></span>&lt;70%</div><div id="ch-cob" style="height:${Math.max(320,rows.length*32)}px"></div></div>`}
function rDeltaChart(rows){return`<div class="cc"><div class="ct">Δ Cota vs Demanda Projetada</div><div class="cs"><span class="dot" style="background:hsl(142,71%,42%)"></span>Positivo <span style="margin:0 .4rem">|</span><span class="dot" style="background:hsl(4,86%,54%)"></span>Negativo</div><div id="ch-delta" style="height:${Math.max(320,rows.length*32)}px"></div></div>`}
function rPriority(items,type){
  const getCob=r=>type==='rep'?r.cobProjArred:r.cobProjArred;
  const worst=[...items].sort((a,b)=>getCob(a)-getCob(b)).slice(0,5);
  const best=[...items].sort((a,b)=>getCob(b)-getCob(a)).slice(0,5);
  const row=(r,good)=>`<div class="pr"><div><div style="font-size:.8rem;font-weight:600">${type==='rep'?r.nome:r.produto?r.produto.replace(/ MF_/,'').replace(/ HYQ/,'').replace(/_$/,''):r.familia}</div><div style="font-size:.67rem;color:var(--muted-fg)">${type==='rep'?r.codigo||'':r.familia||''}</div></div><span class="mono fw8" style="color:${good?'var(--success)':'var(--danger)'}">${fp(getCob(r))}</span></div>`;
  return`<div class="grid g2 gap-4">
    <div class="card" style="border-color:hsla(4,86%,48%,.3)">
      <h3 style="font-size:.875rem;font-weight:700;color:var(--danger);display:flex;align-items:center;gap:.5rem;margin-bottom:.875rem">${ic('alert',15)} Atuar Urgente</h3>
      ${worst.map(r=>row(r,false)).join('')}
    </div>
    <div class="card" style="border-color:hsla(142,71%,35%,.3)">
      <h3 style="font-size:.875rem;font-weight:700;color:var(--success);display:flex;align-items:center;gap:.5rem;margin-bottom:.875rem">${ic('shield',15)} Blindar — Top</h3>
      ${best.map(r=>row(r,true)).join('')}
    </div>
  </div>`;
}
// Recharts
function mountCharts(){
  const{BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine,Cell,LabelList}=Recharts;
  function mkChart(id,data,dk,refX,ttFmt,lblFmt){
    const el=document.getElementById(id);if(!el)return;
    const lbl=props=>{
      const{x,y,width,height,index}=props;const e=data[index];if(!e)return null;
      const isP=e[dk]>=0;
      return React.createElement('text',{x:isP?x+width+6:x+width-6,y:y+height/2,fill:'var(--fg)',fontSize:10,fontWeight:700,textAnchor:isP?'start':'end',dominantBaseline:'middle'},lblFmt(e));
    };
    ReactDOM.render(
      React.createElement(ResponsiveContainer,{width:'100%',height:'100%'},
        React.createElement(BarChart,{data,layout:'vertical',margin:{left:8,right:75}},
          React.createElement(CartesianGrid,{strokeDasharray:'3 3',horizontal:false,stroke:'var(--chart-grid)',opacity:.5}),
          React.createElement(XAxis,{type:'number',tick:{fontSize:11,fill:'var(--chart-text)',fontWeight:500},axisLine:{stroke:'var(--chart-grid)'},tickLine:{stroke:'var(--chart-grid)'}}),
          React.createElement(YAxis,{type:'category',dataKey:'name',tick:{fontSize:11,fill:'var(--chart-text)',fontWeight:500},width:145,axisLine:false,tickLine:false}),
          React.createElement(Tooltip,{formatter:ttFmt,contentStyle:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,color:'var(--fg)',fontSize:12,fontWeight:600,padding:'10px 14px',boxShadow:'0 8px 30px rgba(0,0,0,.2)'}}),
          refX!==null?React.createElement(ReferenceLine,{x:refX,stroke:refX===0?'var(--fg)':'hsl(142,71%,42%)',strokeDasharray:refX===0?'':'4 4',strokeWidth:1.5,...(refX===100?{label:{value:'Meta 100%',position:'top',fontSize:11,fill:'hsl(142,71%,42%)',fontWeight:700}}:{})}):null,
          React.createElement(Bar,{dataKey:dk,radius:[0,4,4,0],barSize:18,name:''},
            ...data.map((e,i)=>React.createElement(Cell,{key:i,fill:e.fill})),
            React.createElement(LabelList,{content:lbl})
          )
        )
      ),el
    );
  }
  // product charts
  if(section==='produto'){
    const rows=tab==='reais'?(dashData.valorRows||[]):(dashData.unidadesRows||[]);
    if(document.getElementById('ch-cob')){
      const data=[...rows].sort((a,b)=>a.cobProjArred-b.cobProjArred).map(r=>({name:r.produto.replace(/ MF_/,'').replace(/ HYQ/,'').replace(/_$/,''),cobProj:parseFloat((r.cobProjArred*100).toFixed(1)),fill:r.cobProjArred>=1?'hsl(142,71%,42%)':r.cobProjArred>=.7?'hsl(38,92%,52%)':'hsl(4,86%,54%)'}));
      mkChart('ch-cob',data,'cobProj',100,v=>[`${v}%`,'Cob. Projetada'],e=>`${e.cobProj.toFixed(1)}%`);
    }
    if(document.getElementById('ch-delta')){
      const sorted=[...rows].sort((a,b)=>a.deltaCota-b.deltaCota);
      const mA=Math.max(...sorted.map(r=>Math.abs(r.deltaCota)),.001),isPct=mA<=10;
      const fV=v=>isPct?v.toFixed(2):Math.abs(v)>=1e6?`${(v/1e6).toFixed(1)}M`:Math.abs(v)>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0);
      const data=sorted.map(r=>({name:r.produto.replace(/ MF_/,'').replace(/ HYQ/,'').replace(/_$/,''),delta:isPct?parseFloat(r.deltaCota.toFixed(2)):parseFloat(r.deltaCota.toFixed(0)),fill:r.deltaCota>=0?'hsl(142,71%,42%)':'hsl(4,86%,54%)'}));
      mkChart('ch-delta',data,'delta',0,v=>[isPct?`${v.toFixed(2)}%`:fV(v),'Δ Cota'],e=>fV(e.delta));
    }
  }
  // rep charts
  if(section==='rep'){
    const reps=dashData.reps||[];const isR=tab==='reais';
    if(document.getElementById('rep-cob')){
      const data=[...reps].sort((a,b)=>(isR?a.cobProjArred:a.uni?.cobProjArred||0)-(isR?b.cobProjArred:b.uni?.cobProjArred||0)).map(r=>{const c=isR?r.cobProjArred:r.uni?.cobProjArred||0;return{name:r.nome,cobProj:parseFloat((c*100).toFixed(1)),fill:c>=1?'hsl(142,71%,42%)':c>=.7?'hsl(38,92%,52%)':'hsl(4,86%,54%)'};});
      mkChart('rep-cob',data,'cobProj',100,v=>[`${v}%`,'Cob. Projetada'],e=>`${e.cobProj.toFixed(1)}%`);
    }
    if(document.getElementById('rep-delta')){
      const sorted=[...reps].sort((a,b)=>(isR?a.deltaCota:a.uni?.deltaCota||0)-(isR?b.deltaCota:b.uni?.deltaCota||0));
      const fV=v=>Math.abs(v)>=1e6?`${(v/1e6).toFixed(1)}M`:Math.abs(v)>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0);
      const data=sorted.map(r=>{const d=isR?r.deltaCota:r.uni?.deltaCota||0;return{name:r.nome,delta:parseFloat(d.toFixed(0)),fill:d>=0?'hsl(142,71%,42%)':'hsl(4,86%,54%)'};});
      mkChart('rep-delta',data,'delta',0,v=>[fV(v),'Δ Cota'],e=>fV(e.delta));
    }
  }
}
// Actions
function toggleTheme(){applyTheme(theme==='dark'?'light':'dark');render()}
async function doOut(){await sb.auth.signOut();me=null;dashData=null;render()}
function doNew(){dashData=null;vFile=null;uFile=null;err=null;render()}
function setTab(t){tab=t;render()}
function setView(v){view=v;render()}
function setSec(s){section=s;render()}
async function doSave(){
  if(!dashData||saving)return;saving=true;
  const btn=document.getElementById('btn-sv');if(btn){btn.disabled=true;btn.innerHTML=`<div class="sp"></div>`}
  try{await saveDash(dashData);toast('Análise salva!','success')}
  catch{toast('Erro ao salvar.','error')}
  finally{saving=false;if(btn){btn.disabled=false;btn.innerHTML=`${ic('save',13)} <span class="hide-mob">Salvar</span>`}}
}
// PDF Export — FIXED: section by section, no giant canvas
async function doPDF(){
  toast('Gerando PDF...','info',10000);
  try{
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const W=297,H=210,m=10;
    // Capture each major section separately
    const targets=[
      {id:'dash-main',scale:1.5},
    ];
    // Fallback: capture individual grid/card sections if main is too big
    let firstPage=true;
    for(const{id,scale}of targets){
      const el=document.getElementById(id);if(!el)continue;
      // Split into chunks by direct children
      const children=Array.from(el.children);
      for(const child of children){
        if(!child.offsetHeight||child.offsetHeight<10)continue;
        let canv;
        try{
          canv=await html2canvas(child,{
            scale,useCORS:true,allowTaint:true,
            backgroundColor:theme==='dark'?'#161b27':'#f5f6f8',
            logging:false,imageTimeout:0,
          });
        }catch(e){console.warn('canvas err',e);continue}
        if(!firstPage)pdf.addPage();firstPage=false;
        const iW=canv.width,iH=canv.height;
        const ratio=Math.min((W-m*2)/iW,(H-m*2)/iH);
        const dW=iW*ratio,dH=iH*ratio;
        pdf.addImage(canv.toDataURL('image/jpeg',.85),'JPEG',(W-dW)/2,(H-dH)/2,dW,dH);
      }
    }
    pdf.save('analise-360.pdf');
    toast('PDF exportado!','success');
  }catch(e){console.error(e);toast('Erro ao exportar: '+e.message,'error')}
}
async function doPNG(){
  const el=document.getElementById('dash-main');if(!el)return;
  toast('Gerando imagem...','info',8000);
  try{
    const canv=await html2canvas(el,{
      scale:2,useCORS:true,allowTaint:true,
      backgroundColor:theme==='dark'?'#161b27':'#f5f6f8',
      logging:false,imageTimeout:0,windowWidth:1360,
    });
    const a=document.createElement('a');
    a.download='analise-360.png';a.href=canv.toDataURL('image/png');a.click();
    toast('Imagem exportada!','success');
  }catch(e){console.error(e);toast('Erro: '+e.message,'error')}
}
