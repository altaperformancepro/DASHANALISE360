<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Análise 360° Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f3f4f8;--fg:#0d1422;--card:#ffffff;
  --p:hsl(224,72%,50%);--pg:hsla(224,72%,50%,.30);--p2:hsl(250,70%,58%);--p3:hsl(280,65%,60%);
  --sec:#e6e8f0;--muted:#e2e4ed;--mfg:#5c6880;
  --acc:#dadde8;--brd:#dce0ec;
  --s:hsl(142,62%,33%);--sg:hsla(142,62%,40%,.36);--sl:hsla(142,62%,33%,.10);
  --w:hsl(38,88%,43%);--wl:hsla(38,88%,43%,.11);
  --d:hsl(4,80%,46%);--dg:hsla(4,80%,54%,.36);--dl:hsla(4,80%,46%,.10);
  --surf:#eceef4;--ctxt:#4e5a6e;--cgrid:#dce0ec;
  --r:.9rem;--rsm:.5rem;
  --sh1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 18px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
  --sh3:0 10px 42px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.07);
  --shp:0 5px 22px var(--pg);--shs:0 5px 18px var(--sg);
}
.dark{
  --bg:hsl(225,22%,9%);--fg:hsl(215,24%,91%);--card:hsl(225,20%,13%);
  --p:hsl(224,76%,62%);--pg:hsla(224,76%,62%,.36);
  --sec:hsl(225,16%,18%);--muted:hsl(225,16%,18%);--mfg:hsl(215,15%,57%);
  --acc:hsl(225,15%,23%);--brd:hsl(225,15%,21%);
  --s:hsl(142,56%,43%);--sg:hsla(142,56%,48%,.40);--sl:hsla(142,56%,43%,.13);
  --w:hsl(38,82%,52%);--wl:hsla(38,82%,52%,.13);
  --d:hsl(4,76%,53%);--dg:hsla(4,76%,58%,.40);--dl:hsla(4,76%,53%,.13);
  --surf:hsl(225,20%,16%);--ctxt:hsl(215,16%,68%);--cgrid:hsl(225,15%,23%);
  --sh1:0 1px 3px rgba(0,0,0,.28);--sh2:0 4px 18px rgba(0,0,0,.38);--sh3:0 10px 42px rgba(0,0,0,.50);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .22s,color .22s}
.mono{font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums}
input,button,select{font-family:inherit}
main{max-width:1380px;margin:0 auto;padding:1.6rem 1.4rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr)}
.g3{display:grid;grid-template-columns:repeat(3,1fr)}
.g4{display:grid;grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}.hm{display:none!important}}
.gap2{gap:.5rem}.gap3{gap:.75rem}.gap4{gap:1rem}.gap5{gap:1.25rem}
.sy>*+*{margin-top:1.4rem}.ox{overflow-x:auto}
/* HEADER */
header{position:sticky;top:0;z-index:200;background:color-mix(in srgb,var(--card) 88%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd)}
.hi{max-width:1380px;margin:0 auto;padding:.55rem 1.4rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.logo{width:2.3rem;height:2.3rem;border-radius:.65rem;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;box-shadow:var(--shp);flex-shrink:0}
.logo svg{width:1.1rem;height:1.1rem;color:#fff}
.brand h1{font-size:.88rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:.32rem;line-height:1.2}
.bpro{font-size:.5rem;font-weight:700;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;padding:.1rem .42rem;border-radius:999px;letter-spacing:.08em;text-transform:uppercase}
.brand p{font-size:.6rem;color:var(--mfg);margin-top:1px}
/* BUTTONS */
button{cursor:pointer;border:none;background:none;font-family:inherit;transition:all .16s cubic-bezier(.4,0,.2,1);outline:none}
button:not(:disabled):active{transform:scale(.96)!important}
.bp{display:inline-flex;align-items:center;gap:.38rem;padding:.44rem .9rem;border-radius:.58rem;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-size:.72rem;font-weight:600;box-shadow:var(--shp);position:relative;overflow:hidden}
.bp::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .16s}
.bp:hover:not(:disabled)::after{opacity:1}
.bp:hover:not(:disabled){box-shadow:0 7px 26px var(--pg);transform:translateY(-1px)}
.bp:disabled{opacity:.36;cursor:not-allowed;transform:none!important;box-shadow:none}
.bs{display:inline-flex;align-items:center;gap:.38rem;padding:.44rem .9rem;border-radius:.58rem;background:linear-gradient(135deg,var(--s),hsl(160,56%,36%));color:#fff;font-size:.72rem;font-weight:600;box-shadow:var(--shs)}
.bs:hover:not(:disabled){box-shadow:0 7px 24px var(--sg);transform:translateY(-1px)}
.bg2{display:inline-flex;align-items:center;gap:.38rem;padding:.44rem .9rem;border-radius:.58rem;background:var(--sec);color:var(--fg);font-size:.72rem;font-weight:500;border:1px solid var(--brd)}
.bg2:hover:not(:disabled){background:var(--acc)}
.bi{width:1.9rem;height:1.9rem;border-radius:.52rem;display:inline-flex;align-items:center;justify-content:center;background:var(--sec);color:var(--mfg);flex-shrink:0}
.bi:hover{background:var(--acc);color:var(--fg)}
.bi.x:hover{background:var(--dl);color:var(--d)}
.bi svg{width:.9rem;height:.9rem}
.bproc{width:100%;padding:.9rem;border-radius:var(--r);background:linear-gradient(135deg,var(--p),var(--p2),var(--p3));background-size:200% 200%;color:#fff;font-weight:700;font-size:.88rem;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.55rem;box-shadow:var(--shp);animation:gsh 4s ease infinite;position:relative;overflow:hidden}
.bproc::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.13),transparent);transform:translateX(-100%)}
.bproc:hover:not(:disabled)::after{animation:shim .75s ease}
.bproc:hover:not(:disabled){box-shadow:0 11px 36px var(--pg);transform:translateY(-2px)}
.bproc:disabled{opacity:.3;cursor:not-allowed;transform:none!important;animation:none;box-shadow:none}
@keyframes gsh{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes shim{to{transform:translateX(100%)}}
.bauth{width:100%;padding:.65rem;border-radius:.58rem;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:600;font-size:.85rem;font-family:inherit;box-shadow:var(--shp)}
.bauth:hover:not(:disabled){box-shadow:0 7px 26px var(--pg);transform:translateY(-1px)}
.bauth:disabled{opacity:.42;cursor:not-allowed;transform:none!important}
/* FAM/REP SEG */
.seg{display:flex;background:var(--surf);border-radius:.65rem;padding:.2rem;gap:.16rem}
.sb2{padding:.44rem .95rem;border-radius:.48rem;font-size:.74rem;font-weight:600;color:var(--mfg);white-space:nowrap;display:flex;align-items:center;gap:.3rem}
.sb2.on{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:var(--shp)}
.sb2:hover:not(.on){color:var(--fg)}
.sb2 svg{width:.78rem;height:.78rem}
/* FAMILIA / PRODUTO VIEW TAB */
.vtabs{display:flex;background:var(--surf);border-radius:.52rem;padding:.16rem;gap:.1rem}
.vt{padding:.36rem .7rem;border-radius:.38rem;font-size:.7rem;font-weight:500;color:var(--mfg);white-space:nowrap}
.vt.on{background:var(--card);color:var(--fg);box-shadow:var(--sh1);font-weight:600}
.vt:hover:not(.on){color:var(--fg)}
/* TAB REAIS/UNID */
.tt{display:flex;align-items:center;gap:.45rem;padding:.56rem 1.1rem;border-radius:.65rem;font-weight:600;font-size:.82rem;border:1.5px solid var(--brd);color:var(--mfg);background:var(--card)}
.tt:hover:not(:disabled){border-color:var(--p);color:var(--p)}
.tt.onr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-color:transparent;box-shadow:var(--shp)}
.tt.onu{background:linear-gradient(135deg,var(--s),hsl(160,56%,36%));color:#fff;border-color:transparent;box-shadow:var(--shs)}
.tt:disabled{opacity:.36;cursor:not-allowed}
.tt svg{width:.9rem;height:.9rem;flex-shrink:0}
/* KPI */
.kpi{border-radius:var(--r);padding:1.15rem;border:1px solid var(--brd);background:var(--card);position:relative;overflow:hidden;box-shadow:var(--sh1);transition:all .2s}
.kpi:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;right:0;width:5rem;height:5rem;border-radius:50%;opacity:.07;transform:translate(30%,-30%)}
.kpi.ks{border-color:hsla(142,62%,33%,.2);background:linear-gradient(135deg,var(--card),var(--sl))}.kpi.ks::before{background:var(--s)}
.kpi.kw{border-color:hsla(38,88%,43%,.2);background:linear-gradient(135deg,var(--card),var(--wl))}.kpi.kw::before{background:var(--w)}
.kpi.kd{border-color:hsla(4,80%,46%,.2);background:linear-gradient(135deg,var(--card),var(--dl))}.kpi.kd::before{background:var(--d)}
.kl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mfg)}
.kv{font-size:1.65rem;font-weight:800;margin:.34rem 0 0;line-height:1;letter-spacing:-.02em}
.ks2{font-size:.63rem;color:var(--mfg);margin-top:.28rem}
.kbar{height:.2rem;background:var(--muted);border-radius:2px;margin-top:.65rem;overflow:hidden}
.kbf{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
/* CARDS */
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:1.15rem;box-shadow:var(--sh1);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--sh2)}
.cardh:hover{transform:translateY(-3px)}
/* UPLOAD */
.ugrid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.15rem}
@media(max-width:680px){.ugrid{grid-template-columns:1fr}}
.ugroup{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh1)}
.ughd{padding:.65rem 1rem;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:.45rem}
.ughd h3{font-size:.76rem;font-weight:700}
.ugbody{display:grid;grid-template-columns:1fr 1fr}
.uz{position:relative;cursor:pointer;padding:1.15rem .9rem;text-align:center;transition:all .2s;background:var(--card);border-right:1px solid var(--brd)}
.uz:last-child{border-right:none}
.uz:hover{background:color-mix(in srgb,var(--p) 4%,var(--card))}
.uz.done{background:var(--sl)}
.uz input[type=file]{display:none}
.uzico{width:2.2rem;height:2.2rem;border-radius:.55rem;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .2s}
.uzico.val{background:hsla(224,72%,50%,.1);color:var(--p)}
.uzico.uni{background:var(--sl);color:var(--s)}
.uzico svg{width:1rem;height:1rem}
.uz.done .uzico{background:var(--sl);color:var(--s)}
.uzlbl{font-size:.68rem;font-weight:600;margin-top:.45rem;display:flex;align-items:center;justify-content:center;gap:.25rem}
.uzlbl.val{color:var(--p)}.uzlbl.uni{color:var(--s)}
.uzfn{font-size:.58rem;font-family:'Geist Mono',monospace;color:var(--s);margin-top:.22rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;margin-left:auto;margin-right:auto}
.uzhi{font-size:.58rem;color:var(--mfg);opacity:.55;margin-top:.25rem}
.pdots{display:flex;gap:.28rem;justify-content:center;padding:.45rem 1rem;border-top:1px solid var(--brd)}
.pdot{width:.42rem;height:.42rem;border-radius:50%;background:var(--muted);transition:background .2s}
.pdot.on{background:var(--s)}
/* REP CARD */
.rc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:1.15rem;box-shadow:var(--sh1);transition:all .22s;position:relative;overflow:hidden}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.rc.rbl::before{background:linear-gradient(180deg,var(--s),hsl(160,56%,46%))}
.rc.rat::before{background:linear-gradient(180deg,var(--d),hsl(4,80%,56%))}
.rc:hover{box-shadow:var(--sh3);transform:translateY(-3px)}
.rnk{width:1.55rem;height:1.55rem;border-radius:.42rem;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;flex-shrink:0}
.rnk.gold{background:linear-gradient(135deg,hsl(42,95%,54%),hsl(35,95%,44%));color:#fff;box-shadow:0 3px 10px hsla(42,95%,50%,.44)}
.rnk.silver{background:linear-gradient(135deg,hsl(220,18%,66%),hsl(220,14%,53%));color:#fff}
.rnk.bronze{background:linear-gradient(135deg,hsl(25,60%,52%),hsl(25,60%,41%));color:#fff}
.rnk.other{background:var(--surf);color:var(--mfg)}
.ctr{height:.38rem;background:var(--muted);border-radius:3px;overflow:hidden;margin:.42rem 0}
.ctf{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.ms{background:var(--surf);border-radius:.42rem;padding:.42rem .58rem}
.msl{font-size:.56rem;color:var(--mfg)}.msv{font-size:.72rem;font-weight:700;margin-top:.06rem}
/* TABLES */
.tw{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh1)}
table{width:100%;border-collapse:collapse;font-size:.69rem}
thead tr{background:var(--surf);border-bottom:1px solid var(--brd)}
th{padding:.65rem .9rem;color:var(--mfg);font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
th.r,td.r{text-align:right}th.c,td.c{text-align:center}
td{padding:.65rem .9rem;border-bottom:1px solid color-mix(in srgb,var(--brd) 48%,transparent);transition:background .1s}
tr:last-child td{border-bottom:none}
tr:hover td{background:color-mix(in srgb,var(--p) 4%,transparent)}
/* CHART */
.cc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:1.35rem;box-shadow:var(--sh1)}
.ct{font-size:.92rem;font-weight:700;margin-bottom:.18rem;letter-spacing:-.01em}
.cs{font-size:.68rem;color:var(--mfg);margin-bottom:1rem;display:flex;flex-wrap:wrap;align-items:center;gap:.4rem}
.dot{display:inline-block;width:.5rem;height:.5rem;border-radius:50%}
/* PRIORITY */
.pr{display:flex;align-items:center;justify-content:space-between;padding:.56rem 0;border-bottom:1px solid color-mix(in srgb,var(--brd) 45%,transparent)}
.pr:last-child{border-bottom:none}
/* AUTH */
.authp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:radial-gradient(ellipse at 60% 40%,color-mix(in srgb,var(--p) 7%,transparent),transparent 70%)}
.authb{width:100%;max-width:368px;background:var(--card);border:1px solid var(--brd);border-radius:1.1rem;padding:1.8rem;box-shadow:var(--sh3)}
.alogo{width:3rem;height:3rem;border-radius:.85rem;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:var(--shp)}
.alogo svg{width:1.4rem;height:1.4rem;color:#fff}
.ifw{position:relative}.ifw svg{position:absolute;left:.68rem;top:50%;transform:translateY(-50%);width:.92rem;height:.92rem;color:var(--mfg);pointer-events:none}
.ifw input{width:100%;padding:.6rem .9rem .6rem 2.2rem;border-radius:.58rem;border:1.5px solid var(--brd);background:var(--bg);color:var(--fg);font-size:.84rem;transition:border-color .13s,box-shadow .13s}
.ifw input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px var(--pg)}
.alinks{text-align:center;font-size:.68rem;color:var(--mfg)}
.alinks button{font-size:.68rem;color:var(--p);font-weight:600;text-decoration:underline;text-decoration-color:transparent}
.alinks button:hover{text-decoration-color:currentColor}
/* TOAST */
#tw{position:fixed;bottom:1.3rem;right:1.3rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast{pointer-events:all;background:var(--card);border:1.5px solid var(--brd);border-radius:.65rem;padding:.65rem .9rem;font-size:.76rem;font-weight:500;min-width:220px;max-width:320px;box-shadow:var(--sh3);display:flex;align-items:center;gap:.4rem;animation:tIn .2s ease}
.toast.success{border-color:var(--s);color:var(--s)}
.toast.error{border-color:var(--d);color:var(--d)}
@keyframes tIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{to{opacity:0;transform:translateX(16px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:.9rem;height:.9rem;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes fu{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .3s ease}
.divv{width:1px;height:1.3rem;background:var(--brd)}
.ts{color:var(--s)}.td2{color:var(--d)}.tw2{color:var(--w)}.tm{color:var(--mfg)}
.fw8{font-weight:800}.fw7{font-weight:700}.fw6{font-weight:600}
.hero{text-align:center;margin-bottom:2rem}
.hico{width:4.2rem;height:4.2rem;border-radius:1.2rem;background:linear-gradient(135deg,var(--p),var(--p2),var(--p3));display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:var(--shp),0 0 44px var(--pg)}
.hico svg{width:2rem;height:2rem;color:#fff}
.hero h2{font-size:1.8rem;font-weight:800;letter-spacing:-.025em}
.hero p{font-size:.83rem;color:var(--mfg);margin-top:.4rem;max-width:420px;margin-left:auto;margin-right:auto}
.ldf{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:.65rem;font-size:.85rem;color:var(--mfg)}
.dh{border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.dh summary{padding:.65rem 1rem;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mfg);cursor:pointer;list-style:none;display:flex;align-items:center;gap:.4rem}
.dh .db{padding:.65rem 1rem .9rem;font-size:.63rem;color:var(--mfg);font-family:'Geist Mono',monospace;line-height:1.8}
.eb{font-size:.72rem;color:var(--d);background:var(--dl);border:1px solid hsla(4,80%,46%,.16);border-radius:.58rem;padding:.55rem .9rem;text-align:center}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
@media(max-width:1024px){.dsk{display:none!important}}
@media(min-width:1025px){.mob{display:none!important}}
.stbg{padding:.12rem .44rem;border-radius:999px;font-size:.57rem;font-weight:700;white-space:nowrap}
/* PODIUM */
.podium{background:linear-gradient(135deg,var(--card),var(--surf));border:1px solid var(--brd);border-radius:var(--r);padding:1.3rem;box-shadow:var(--sh1)}
</style>
</head>
<body>
<div id="app"><div class="ldf"><div class="sp"></div> Carregando...</div></div>
<div id="tw"></div>
<script>
/* ─── SUPABASE ─── */
const SU="https://qcayjabwpgowgssmrxnj.supabase.co";

/* ─── FORMATTERS ─── */
const fc=v=>{const a=Math.abs(v);if(a>=1e6)return`R$ ${(v/1e6).toFixed(1)}M`;if(a>=1000)return`R$ ${(v/1000).toFixed(1)}k`;return`R$ ${v.toFixed(0)}`};
const fn=v=>new Intl.NumberFormat('pt-BR').format(Math.round(v));
const fp=v=>`${(v*100).toFixed(1)}%`;

/* ─── EXCEL HELPERS ─── */
function nrm(n){return String(n).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[_\s.]+/g,' ').trim()}
function fCol(row,names){
  const ks=Object.keys(row),ns=names.map(nrm);
  for(const n of ns)for(const k of ks)if(nrm(k)===n)return row[k];
  for(const n of ns)for(const k of ks)if(nrm(k).includes(n))return row[k];
  return undefined;
}
function toN(v){
  if(v===null||v===undefined||v==='')return 0;
  if(typeof v==='number')return isNaN(v)?0:v;
  let s=String(v).trim().replace(/[¤$€£¥\s]/g,'');
  const lc=s.lastIndexOf(','),ld=s.lastIndexOf('.');
  if(lc>ld)s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');
  const p=parseFloat(s);return isNaN(p)?0:p;
}
function exBase(row){
  return{
    realAA:toN(fCol(row,['REAL. AA','REAL AA'])),
    cota:toN(fCol(row,['COTA'])),
    realizado:toN(fCol(row,['REALIZADO'])),
    cobReal:toN(fCol(row,['COB. REAL','COB REAL'])),
    projArred:toN(fCol(row,['PROJ. ARRED','PROJ ARRED'])),
    cobProjArred:toN(fCol(row,['COB. PROJ. ARRED','COB PROJ ARRED'])),
    deltaCota:toN(fCol(row,['Δ Cota Vs Dem. Proj','Δ  Cota Vs Dem. Proj','Delta Cota','DELTA'])),
    difRealizadoCota:toN(fCol(row,['Diferença Realizado x Cota'])),
  };
}

/* ─── PARSERS ─── */
function parseFam(wb){
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(sheet,{defval:0});
  const rows=[];let curFam='';
  for(const row of raw){
    const fv=String(Object.values(row)[0]??'');
    if(fv.toLowerCase().includes('filtros')||fv.toLowerCase().includes('meses é'))continue;
    const fam=String(fCol(row,['FAMILIA'])??'').trim();
    const prod=String(fCol(row,['NM_FAMILIA_PP','nm familia pp'])??'').trim();
    if(fam&&!fam.toLowerCase().includes('total'))curFam=fam;
    if(!prod)continue;
    const isTotal=prod.toLowerCase()==='total';
    const ext={...exBase(row),familia:curFam,produto:isTotal?'__TOTAL__':prod};
    if(!isTotal&&ext.cota===0)continue;
    rows.push(ext);
  }
  return rows;
}
function parseRep(wb){
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(sheet,{defval:0});
  const reps=[];
  for(const row of raw){
    const terr=String(fCol(row,['TERRITORIO'])??'').trim();
    if(!terr||terr.toLowerCase()==='total'||terr.toLowerCase().includes('filtros'))continue;
    const cota=toN(fCol(row,['COTA']));if(cota===0)continue;
    let code='',name=terr;
    const m=terr.match(/^(\d+)\s*-\s*(.+)$/);if(m){code=m[1];name=m[2].trim()}
    reps.push({...exBase(row),codigo:code,nome:name,territorio:terr});
  }
  reps.sort((a,b)=>b.cobProjArred-a.cobProjArred);
  return reps;
}
function sumArr(arr){
  const t={cota:0,realizado:0,projArred:0,deltaCota:0,cobProjArred:0};
  arr.forEach(r=>{if(!r)return;t.cota+=r.cota||0;t.realizado+=r.realizado||0;t.projArred+=r.projArred||0;t.deltaCota+=r.deltaCota||0;});
  t.cobProjArred=t.cota>0?t.projArred/t.cota:0;
  return t;
}
function buildDash(wFV,wFU,wRV,wRU){
  let famData=null;
  if(wFV){
    const vR=parseFam(wFV),uR=wFU?parseFam(wFU):null;
    const vP=vR.filter(r=>r.produto!=='__TOTAL__');
    const uP=uR?uR.filter(r=>r.produto!=='__TOTAL__'):[];
    const fams=new Set(vR.filter(r=>r.produto==='__TOTAL__').map(r=>r.familia));
    const sums=[];
    for(const fam of fams){
      const vt=vR.find(r=>r.familia===fam&&r.produto==='__TOTAL__');
      const ut=uR?uR.find(r=>r.familia===fam&&r.produto==='__TOTAL__'):null;
      if(!vt)continue;
      const fvp=vR.filter(r=>r.familia===fam&&r.produto!=='__TOTAL__');
      const fup=uR?uR.filter(r=>r.familia===fam&&r.produto!=='__TOTAL__'):[];
      const prods=fvp.map(vp=>({
        nome:vp.produto.replace(/_$/,'').replace(/ HYQ$/,'').replace(/ MF_$/,'').trim(),
        valor:vp,
        unidades:fup.find(u=>u.produto===vp.produto)||null,
      }));
      sums.push({familia:fam,valor:vt,unidades:ut,produtos:prods,status:vt.deltaCota>=0?'blindar':'atuar'});
    }
    sums.sort((a,b)=>{
      if(a.status==='atuar'&&b.status==='blindar')return-1;
      if(a.status==='blindar'&&b.status==='atuar')return 1;
      return a.valor.deltaCota-b.valor.deltaCota;
    });
    famData={familias:sums,valorRows:vP,unidadesRows:uP,totalValor:sumArr(vP),totalUnidades:uP.length?sumArr(uP):null,hasU:!!uR};
  }
  let repData=null;
  if(wRV){
    const vR=parseRep(wRV),uR=wRU?parseRep(wRU):null;
    const reps=vR.map(vr=>({...vr,uni:uR?uR.find(r=>r.codigo===vr.codigo)||null:null}));
    const tV=sumArr(vR),tU=uR?sumArr(uR):null;
    repData={reps,totalValor:tV,totalUnidades:tU,hasU:!!uR};
  }
  return{famData,repData};
}

function onDrop(e,key){e.preventDefault();const f=e.dataTransfer.files[0];if(f&&(f.name.endsWith('.xlsx')||f.name.endsWith('.xls'))){files[key]=f;render()}}
function onFile(e,key){const f=e.target.files?.[0];if(f){files[key]=f;render()}}
async function doProc(){
  const{famV,famU,repV,repU}=files;
  if(!famV&&!repV)return;
  loading=true;err=null;render();
  try{
    const rb=async f=>f?f.arrayBuffer():null;
    const[bFV,bFU,bRV,bRU]=await Promise.all([rb(famV),rb(famU),rb(repV),rb(repU)]);
    const rd=t=>t?XLSX.read(t,{type:'array'}):null;
    dashData=buildDash(rd(bFV),rd(bFU),rd(bRV),rd(bRU));
    section=dashData.famData?'produto':'rep';
    try{await saveDash(dashData);toast('Análise salva!','success')}
    catch{toast('Processado — erro ao salvar.','error')}
  }catch(e){err='Erro ao processar. Verifique o formato.';console.error(e);toast('Erro ao processar','error')}
  finally{loading=false;render()}
}

/* ─── KPI ─── */
function kpi(title,val,sub,type='',pct=0,bar=false){
  const cls={success:'ks',warning:'kw',danger:'kd','':''}[type]||'';
  const tc={success:'var(--s)',warning:'var(--w)',danger:'var(--d)','':'var(--fg)'}[type]||'var(--fg)';
  const bc={success:'var(--s)',warning:'var(--w)',danger:'var(--d)','':'var(--p)'}[type]||'var(--p)';
  return`<div class="kpi ${cls}">
    <div class="kl">${title}</div>
    <div class="kv mono ${type==='danger'?'pulse':''}" style="color:${tc}">${val}</div>
    ${sub?`<div class="ks2 mono">${sub}</div>`:''}
    ${bar?`<div class="kbar"><div class="kbf" style="width:${Math.min(pct*100,100)}%;background:${bc}"></div></div>`:''}
  </div>`;
}

/* ─── FAMÍLIA SECTION ─── */
function rFamSec(){
  const fd=dashData.famData;

function rPodium(reps,fmt,gc,gd){
  if(!reps.length)return'';
  const top=[...reps].sort((a,b)=>gc(b)-gc(a)).slice(0,Math.min(3,reps.length));
  const emo=['🥇','🥈','🥉'],rnks=['gold','silver','bronze'];
  return`<div class="podium">
    <h3 style="font-size:.86rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:.42rem">${ic('medal',14,'ts')} <span>Top Representantes</span></h3>
    <div class="g3 gap3" style="display:grid">${top.map((r,i)=>{
      const cob=gc(r),delta=gd(r);
      return`<div style="background:var(--card);border:1px solid ${i===0?'hsla(42,95%,50%,.35)':'var(--brd)'};border-radius:var(--rsm);padding:.9rem;text-align:center;position:relative;${i===0?'box-shadow:0 4px 16px hsla(42,95%,50%,.16)':''}">
        <div style="position:absolute;top:.38rem;right:.38rem;font-size:.95rem">${emo[i]}</div>
        <div class="rnk ${rnks[i]}" style="width:2.2rem;height:2.2rem;border-radius:.6rem;margin:0 auto .6rem;font-size:.78rem">${i+1}</div>
        <div style="font-size:.73rem;font-weight:700;margin-bottom:.42rem;line-height:1.3">${r.nome}</div>
        <div style="font-size:1.35rem;font-weight:800;color:var(--s);font-family:'Geist Mono',monospace;line-height:1">${fp(cob)}</div>
        <div style="font-size:.6rem;color:var(--mfg);margin:.22rem 0">Cob. Projetada</div>
        <div style="font-size:.65rem;font-weight:600;font-family:'Geist Mono',monospace;color:${delta>=0?'var(--s)':'var(--d)'}">Δ ${delta>=0?'+':''}${fmt(delta)}</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

function rRepCard(r,idx,fmt,gc,gd){
  const cob=gc(r),isR=tab==='reais';
  const real=isR?r.realizado:(r.uni?.realizado??r.realizado);
  const cota=isR?r.cota:(r.uni?.cota??r.cota);
  const proj=isR?r.projArred:(r.uni?.projArred??r.projArred);
  const delta=gd(r);
  const sC=cob>=1?'var(--s)':cob>=.7?'var(--w)':'var(--d)';
  const rnk=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'other';
  return`<div class="rc ${delta>=0?'rbl':'rat'}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem;gap:.4rem">
      <div style="display:flex;align-items:center;gap:.48rem;min-width:0">
        <div class="rnk ${rnk}">${idx+1}</div>
        <div style="min-width:0">
          <div style="font-size:.75rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.nome}</div>
          ${r.codigo?`<div style="font-size:.58rem;color:var(--mfg);font-family:'Geist Mono',monospace">${r.codigo}</div>`:''}
        </div>
      </div>
      <span class="stbg" style="background:${sC}18;color:${sC}">${cob>=1?'✅ Meta':cob>=.7?'⚠️ Atenção':'🚨 Atuar'}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--mfg);margin-bottom:.26rem"><span>Cob. Projetada</span><span class="mono fw8" style="color:${sC}">${fp(cob)}</span></div>
    <div class="ctr"><div class="ctf" style="width:${Math.min(cob/1.5*100,100)}%;background:${sC}"></div></div>
    <div class="g2 gap2" style="display:grid;margin-top:.65rem">
      <div class="ms"><div class="msl">Realizado</div><div class="msv mono">${fmt(real)}</div><div style="font-size:.56rem;color:${cota>0&&real/cota>=1?'var(--s)':'var(--w)'}">${cota>0?((real/cota)*100).toFixed(1):0}% cota</div></div>
      <div class="ms"><div class="msl">Δ Cota</div><div class="msv mono" style="color:${delta>=0?'var(--s)':'var(--d)'}">${delta>=0?'+':''}${fmt(delta)}</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.65rem;padding:.42rem .56rem;background:var(--surf);border-radius:.4rem">
      <span style="font-size:.6rem;color:var(--mfg)">Projeção</span>
      <span class="mono fw7" style="font-size:.72rem">${fmt(proj)}</span>

function rRepTbl(reps,isR,fmt,gc,gd){
  const sorted=[...reps].sort((a,b)=>gc(a)-gc(b));
  const sc=c=>c>=1?'var(--s)':c>=.7?'var(--w)':'var(--d)';
  return`<div class="tw ox"><table>
    <thead><tr><th>#</th><th>Representante</th><th class="r">Cota</th><th class="r">Realizado</th><th class="r">Cob. Real</th><th class="r">Projeção</th><th class="r">Cob. Proj.</th><th class="r">Δ Cota</th><th class="c">Status</th></tr></thead>
    <tbody>${sorted.map((r,i)=>{
      const cob=gc(r),delta=gd(r);
      const real=isR?r.realizado:(r.uni?.realizado??r.realizado);
      const cota=isR?r.cota:(r.uni?.cota??r.cota);
      const proj=isR?r.projArred:(r.uni?.projArred??r.projArred);
      const cobR=isR?r.cobReal:(r.uni?.cobReal??r.cobReal);
      return`<tr>
        <td style="color:var(--mfg)">${sorted.length-i}</td>
        <td><div style="font-weight:600;font-size:.73rem">${r.nome}</div>${r.codigo?`<div style="font-size:.58rem;color:var(--mfg);font-family:'Geist Mono',monospace">${r.codigo}</div>`:''}</td>
        <td class="r mono" style="color:var(--mfg)">${fmt(cota)}</td>
        <td class="r mono fw6">${fmt(real)}</td>
        <td class="r mono">${fp(cobR)}</td>
        <td class="r mono" style="color:var(--mfg)">${fmt(proj)}</td>
        <td class="r mono fw8" style="color:${sc(cob)}">${fp(cob)}</td>
        <td class="r"><span class="mono fw6" style="color:${delta>=0?'var(--s)':'var(--d)'}">${delta>=0?'+':''}${fmt(delta)}</span></td>
        <td class="c" style="font-size:.6rem;font-weight:700;color:${sc(cob)}">${cob>=1?'✅ Batendo':cob>=.7?'⚠️ Atenção':'🚨 Atuar'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

/* ─── PRIORITY ─── */
function rPriority(items,type,gcFn){
  const _c=r=>type==='rep'?gcFn(r):r.cobProjArred;
  const _n=r=>type==='rep'?r.nome:(r.produto?r.produto.replace(/ MF_/,'').replace(/ HYQ/,'').replace(/_$/,''):r.familia||'');
  const _s=r=>type==='rep'?(r.codigo||''):(r.familia||'');
  const worst=[...items].sort((a,b)=>_c(a)-_c(b)).slice(0,5);
  const best=[...items].sort((a,b)=>_c(b)-_c(a)).slice(0,5);
  const row=(r,good)=>`<div class="pr"><div><div style="font-size:.76rem;font-weight:600">${_n(r)}</div><div style="font-size:.62rem;color:var(--mfg)">${_s(r)}</div></div><span class="mono fw8" style="color:${good?'var(--s)':'var(--d)'}">${fp(_c(r))}</span></div>`;
  return`<div class="g2 gap4" style="display:grid">
    <div class="card" style="border-color:hsla(4,80%,46%,.25)"><h3 style="font-size:.82rem;font-weight:700;color:var(--d);display:flex;align-items:center;gap:.4rem;margin-bottom:.75rem">${ic('alert',13)} Atuar Urgente</h3>${worst.map(r=>row(r,false)).join('')}</div>
    <div class="card" style="border-color:hsla(142,62%,33%,.25)"><h3 style="font-size:.82rem;font-weight:700;color:var(--s);display:flex;align-items:center;gap:.4rem;margin-bottom:.75rem">${ic('shield',13)} Blindar — Top</h3>${best.map(r=>row(r,true)).join('')}</div>
  </div>`;
}

function noData(msg){return`<div style="text-align:center;padding:3rem;color:var(--mfg);font-size:.85rem">${msg}</div>`}

/* ─── RECHARTS — FIXED ─── */
function mountCharts(attempt){
  attempt=attempt||0;
  // Wait for Recharts global
  if(typeof Recharts==='undefined'){setTimeout(()=>mountCharts(attempt+1),150);return}
  if(typeof React==='undefined'||typeof ReactDOM==='undefined'){setTimeout(()=>mountCharts(attempt+1),150);return}
  const{BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine,Cell,LabelList}=Recharts;

  function mkBar(id,data,dk,refX,ttLabel,lblFmt){
    const el=document.getElementById(id);
    if(!el||!data||!data.length){return}
    // If element has no width yet, retry
    if(el.offsetWidth===0&&attempt<10){setTimeout(()=>mountCharts(attempt+1),120);return}
    // Clear any previous render
    try{ReactDOM.unmountComponentAtNode(el)}catch(e){}

    const LblComp=props=>{
      const{x,y,width,height,index}=props;
      const e=data[index];if(!e)return null;
      const isPos=(e[dk]||0)>=0;
      return React.createElement('text',{
        x:isPos?x+width+5:x-3,
        y:y+height/2,
        fill:'var(--ctxt)',fontSize:10,fontWeight:700,
        textAnchor:isPos?'start':'end',
        dominantBaseline:'middle'
      },lblFmt(e));
    };

    const ttStyle={background:'var(--card)',border:'1px solid var(--brd)',borderRadius:8,color:'var(--fg)',fontSize:11,fontWeight:600,padding:'8px 12px',boxShadow:'0 8px 26px rgba(0,0,0,.16)'};

    ReactDOM.render(
      React.createElement(ResponsiveContainer,{width:'100%',height:'100%'},
        React.createElement(BarChart,{data,layout:'vertical',margin:{top:4,right:70,left:8,bottom:4}},
          React.createElement(CartesianGrid,{strokeDasharray:'3 3',horizontal:false,stroke:'var(--cgrid)',opacity:.45}),
          React.createElement(XAxis,{type:'number',tick:{fontSize:10,fill:'var(--ctxt)'},axisLine:{stroke:'var(--cgrid)'},tickLine:{stroke:'var(--cgrid)'}}),
          React.createElement(YAxis,{type:'category',dataKey:'name',width:148,tick:{fontSize:10,fill:'var(--ctxt)',fontWeight:500},axisLine:false,tickLine:false}),
          React.createElement(Tooltip,{formatter:(v)=>[ttLabel(v),dk],contentStyle:ttStyle}),
          refX!==null&&React.createElement(ReferenceLine,{x:refX,stroke:refX===0?'var(--mfg)':'hsl(142,62%,40%)',strokeDasharray:refX===0?undefined:'4 3',strokeWidth:1.5,...(refX===100?{label:{value:'Meta',position:'top',fontSize:9,fill:'hsl(142,62%,40%)',fontWeight:700}}:{})}),
          React.createElement(Bar,{dataKey:dk,radius:[0,3,3,0],barSize:16,isAnimationActive:false},
            ...data.map((e,i)=>React.createElement(Cell,{key:`c-${i}`,fill:e.fill||'var(--p)'})),
            React.createElement(LabelList,{content:LblComp})
          )
        )
      ),el
    );
    // Trigger resize so ResponsiveContainer recalculates dimensions
    setTimeout(()=>window.dispatchEvent(new Event('resize')),50);
  }

  const isR=tab==='reais';

  /* ── PRODUTO CHARTS ── */
  if(section==='produto'&&dashData.famData&&famView==='produto'){
    const rows=isR?dashData.famData.valorRows:dashData.famData.unidadesRows;
    const sorted=[...rows].sort((a,b)=>a.cobProjArred-b.cobProjArred);

    // Cobertura
    const cobData=sorted.map(r=>({
      name:r.produto.replace(/ MF_$/,'').replace(/ HYQ$/,'').replace(/_$/,''),
      cobProj:parseFloat((r.cobProjArred*100).toFixed(1)),
      fill:r.cobProjArred>=1?'hsl(142,62%,40%)':r.cobProjArred>=.7?'hsl(38,88%,48%)':'hsl(4,80%,52%)',
    }));
    mkBar('ch-cob',cobData,'cobProj',100,v=>`${v.toFixed(1)}%`,e=>`${e.cobProj.toFixed(1)}%`);

    // Delta
    const dSorted=[...rows].sort((a,b)=>a.deltaCota-b.deltaCota);
    const mA=Math.max(...dSorted.map(r=>Math.abs(r.deltaCota)),.001);
    const fmtD=v=>mA<=5?v.toFixed(2):Math.abs(v)>=1e6?`${(v/1e6).toFixed(1)}M`:Math.abs(v)>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0);
    const deltaData=dSorted.map(r=>({
      name:r.produto.replace(/ MF_$/,'').replace(/ HYQ$/,'').replace(/_$/,''),
      delta:mA<=5?parseFloat(r.deltaCota.toFixed(2)):Math.round(r.deltaCota),
      fill:r.deltaCota>=0?'hsl(142,62%,40%)':'hsl(4,80%,52%)',
    }));
    mkBar('ch-delta',deltaData,'delta',0,v=>fmtD(v),e=>fmtD(e.delta));
  }

  /* ── REP CHARTS ── */
  if(section==='rep'&&dashData.repData){
    const reps=dashData.repData.reps;
    const gc=r=>isR?r.cobProjArred:(r.uni?.cobProjArred??r.cobProjArred);
    const gd=r=>isR?r.deltaCota:(r.uni?.deltaCota??r.deltaCota);

    // Cobertura
    const cobData=[...reps].sort((a,b)=>gc(a)-gc(b)).map(r=>{
      const c=gc(r);
      return{name:r.nome,cobProj:parseFloat((c*100).toFixed(1)),fill:c>=1?'hsl(142,62%,40%)':c>=.7?'hsl(38,88%,48%)':'hsl(4,80%,52%)'};
    });
    mkBar('rep-cob',cobData,'cobProj',100,v=>`${v.toFixed(1)}%`,e=>`${e.cobProj.toFixed(1)}%`);

    // Delta
    const dSorted=[...reps].sort((a,b)=>gd(a)-gd(b));
    const mA=Math.max(...dSorted.map(r=>Math.abs(gd(r))),.001);
    const fmtD=v=>Math.abs(v)>=1e6?`${(v/1e6).toFixed(1)}M`:Math.abs(v)>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0);
    const deltaData=dSorted.map(r=>{
      const d=gd(r);
      return{name:r.nome,delta:Math.round(d),fill:d>=0?'hsl(142,62%,40%)':'hsl(4,80%,52%)'};
    });
    mkBar('rep-delta',deltaData,'delta',0,v=>fmtD(v),e=>fmtD(e.delta));
  }
}

/* ─── ACTIONS ─── */
function toggleTheme(){applyTheme(theme==='dark'?'light':'dark');render()}
async function doOut(){await sb.auth.signOut();me=null;dashData=null;render()}
function doNew(){dashData=null;files={famV:null,famU:null,repV:null,repU:null};err=null;render()}
function setTab(t){tab=t;render();setTimeout(()=>mountCharts(0),120)}
function setFV(v){famView=v;render();setTimeout(()=>mountCharts(0),120)}
function setSec(s){section=s;render();setTimeout(()=>mountCharts(0),120)}

async function doSave(){
  if(!dashData||saving)return;saving=true;
  const btn=document.getElementById('bsv');if(btn){btn.disabled=true;btn.innerHTML=`<div class="sp"></div>`}
  try{await saveDash(dashData);toast('Análise salva!','success')}
  catch{toast('Erro ao salvar.','error')}
  finally{saving=false;if(btn){btn.disabled=false;btn.innerHTML=`${ic('save',12)} <span class="hm">Salvar</span>`}}
}

/* PDF — child by child */
async function doPDF(){
  toast('Gerando PDF…','info',10000);
  try{
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const W=297,H=210,m=10;
    const el=document.getElementById('dm');if(!el)return;
    const kids=Array.from(el.children).filter(c=>c.offsetHeight>10);
    let first=true;
    for(const kid of kids){
      const canv=await html2canvas(kid,{scale:1.7,useCORS:true,allowTaint:true,backgroundColor:theme==='dark'?'#131820':'#f3f4f8',logging:false,imageTimeout:0});
      if(!first)pdf.addPage();first=false;
      const r=Math.min((W-m*2)/canv.width,(H-m*2)/canv.height);
      pdf.addImage(canv.toDataURL('image/jpeg',.86),'JPEG',(W-canv.width*r)/2,(H-canv.height*r)/2,canv.width*r,canv.height*r);
    }
    pdf.save('analise-360.pdf');
    toast('PDF exportado!','success');
  }catch(e){console.error(e);toast('Erro: '+e.message,'error')}
}
async function doPNG(){
  const el=document.getElementById('dm');if(!el)return;
  toast('Gerando imagem…','info',8000);
  try{
    const canv=await html2canvas(el,{scale:2,useCORS:true,allowTaint:true,backgroundColor:theme==='dark'?'#131820':'#f3f4f8',logging:false,imageTimeout:0,windowWidth:1380});
    const a=document.createElement('a');a.download='analise-360.png';a.href=canv.toDataURL('image/png');a.click();
    toast('Imagem exportada!','success');
  }catch(e){console.error(e);toast('Erro: '+e.message,'error')}
}
