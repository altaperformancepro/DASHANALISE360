<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Análise 360° Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ─────────────────────── TOKENS ─────────────────────── */
:root{
  --bg:#f4f5f8;--fg:#0f1623;--card:#ffffff;
  --p:hsl(224,71%,50%);--pg:hsla(224,71%,50%,.32);
  --p2:hsl(250,70%,58%);--p3:hsl(280,65%,60%);
  --sec:#e8eaf0;--muted:#e4e6ed;--mfg:#5a6478;
  --acc:#dde0e9;--brd:#dde0e9;
  --s:hsl(142,64%,34%);--sg:hsla(142,64%,40%,.38);--sl:hsla(142,64%,34%,.11);
  --w:hsl(38,90%,44%);--wl:hsla(38,90%,44%,.12);
  --d:hsl(4,82%,47%);--dg:hsla(4,82%,55%,.38);--dl:hsla(4,82%,47%,.11);
  --surf:#eef0f5;--ctxt:#4a5568;--cgrid:#dde0e9;
  --r:.875rem;--rsm:.5rem;
  --sh1:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
  --sh3:0 10px 40px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.07);
  --shp:0 6px 24px var(--pg);--shs:0 6px 20px var(--sg);
}
.dark{
  --bg:hsl(224,22%,9%);--fg:hsl(215,25%,92%);--card:hsl(224,20%,13%);
  --p:hsl(224,78%,63%);--pg:hsla(224,78%,63%,.38);
  --sec:hsl(224,16%,19%);--muted:hsl(224,16%,19%);--mfg:hsl(215,16%,57%);
  --acc:hsl(224,16%,24%);--brd:hsl(224,15%,21%);
  --s:hsl(142,58%,44%);--sg:hsla(142,58%,50%,.42);--sl:hsla(142,58%,44%,.14);
  --w:hsl(38,84%,54%);--wl:hsla(38,84%,54%,.14);
  --d:hsl(4,78%,54%);--dg:hsla(4,78%,60%,.42);--dl:hsla(4,78%,54%,.14);
  --surf:hsl(224,20%,16%);--ctxt:hsl(215,18%,70%);--cgrid:hsl(224,15%,24%);
  --sh1:0 1px 3px rgba(0,0,0,.28);--sh2:0 4px 16px rgba(0,0,0,.38);--sh3:0 10px 40px rgba(0,0,0,.48);
}
/* ─────────────────────── BASE ─────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .22s,color .22s}
.mono{font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums}
input,button,select{font-family:inherit}
/* ─────────────────────── LAYOUT ─────────────────────── */
.wrap{max-width:1380px;margin:0 auto;padding:0 1.5rem}
main{max-width:1380px;margin:0 auto;padding:1.75rem 1.5rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr)}
.g3{display:grid;grid-template-columns:repeat(3,1fr)}
.g4{display:grid;grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}.hm{display:none!important}}
.gap2{gap:.5rem}.gap3{gap:.75rem}.gap4{gap:1rem}.gap5{gap:1.25rem}.gap6{gap:1.5rem}
.sy>*+*{margin-top:1.5rem}
.ox{overflow-x:auto}
.flex{display:flex}.ic{align-items:center}.sb{justify-content:space-between}.fw{flex-wrap:wrap}
/* ─────────────────────── HEADER ─────────────────────── */
header{position:sticky;top:0;z-index:200;background:color-mix(in srgb,var(--card) 86%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--brd)}
.hi{max-width:1380px;margin:0 auto;padding:.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{width:2.4rem;height:2.4rem;border-radius:.7rem;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;box-shadow:var(--shp);flex-shrink:0}
.logo svg{width:1.15rem;height:1.15rem;color:#fff}
.brand h1{font-size:.9rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:.35rem;line-height:1.2}
.bpro{font-size:.52rem;font-weight:700;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;padding:.12rem .45rem;border-radius:999px;letter-spacing:.08em;text-transform:uppercase}
.brand p{font-size:.62rem;color:var(--mfg);margin-top:1px}
/* ─────────────────────── BUTTONS ─────────────────────── */
button{cursor:pointer;border:none;background:none;font-family:inherit;transition:all .17s cubic-bezier(.4,0,.2,1);outline:none}
button:not(:disabled):active{transform:scale(.96)!important}

/* Primary */
.bp{display:inline-flex;align-items:center;gap:.4rem;padding:.48rem .95rem;border-radius:.6rem;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-size:.73rem;font-weight:600;box-shadow:var(--shp);position:relative;overflow:hidden}
.bp::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.16),transparent);opacity:0;transition:opacity .17s}
.bp:hover:not(:disabled)::after{opacity:1}
.bp:hover:not(:disabled){box-shadow:0 8px 28px var(--pg);transform:translateY(-1px)}
.bp:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none}

/* Success */
.bs{display:inline-flex;align-items:center;gap:.4rem;padding:.48rem .95rem;border-radius:.6rem;background:linear-gradient(135deg,var(--s),hsl(160,58%,38%));color:#fff;font-size:.73rem;font-weight:600;box-shadow:var(--shs)}
.bs:hover:not(:disabled){box-shadow:0 8px 26px var(--sg);transform:translateY(-1px)}

/* Ghost */
.bg2{display:inline-flex;align-items:center;gap:.4rem;padding:.48rem .95rem;border-radius:.6rem;background:var(--sec);color:var(--fg);font-size:.73rem;font-weight:500;border:1px solid var(--brd)}
.bg2:hover:not(:disabled){background:var(--acc);border-color:color-mix(in srgb,var(--brd) 60%,var(--p))}

/* Icon */
.bi{width:2rem;height:2rem;border-radius:.55rem;display:inline-flex;align-items:center;justify-content:center;background:var(--sec);color:var(--mfg);flex-shrink:0}
.bi:hover{background:var(--acc);color:var(--fg)}
.bi.x:hover{background:var(--dl);color:var(--d)}
.bi svg{width:.95rem;height:.95rem}

/* Process CTA */
.bproc{width:100%;padding:.95rem;border-radius:var(--r);background:linear-gradient(135deg,var(--p),var(--p2),var(--p3));background-size:200% 200%;color:#fff;font-weight:700;font-size:.9rem;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.6rem;box-shadow:var(--shp);animation:gshift 4s ease infinite;position:relative;overflow:hidden}
.bproc::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);transform:translateX(-100%)}
.bproc:hover:not(:disabled)::after{animation:shimmer .8s ease}
.bproc:hover:not(:disabled){box-shadow:0 12px 38px var(--pg);transform:translateY(-2px)}
.bproc:disabled{opacity:.32;cursor:not-allowed;transform:none!important;animation:none;box-shadow:none}
@keyframes gshift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes shimmer{to{transform:translateX(100%)}}

/* Auth */
.bauth{width:100%;padding:.68rem;border-radius:.6rem;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:600;font-size:.875rem;font-family:inherit;box-shadow:var(--shp)}
.bauth:hover:not(:disabled){box-shadow:0 8px 28px var(--pg);transform:translateY(-1px)}
.bauth:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

/* View tabs */
.vtabs{display:flex;background:var(--surf);border-radius:.55rem;padding:.18rem;gap:.12rem;flex-wrap:wrap}
.vt{padding:.38rem .7rem;border-radius:.4rem;font-size:.7rem;font-weight:500;color:var(--mfg);white-space:nowrap}
.vt.on{background:var(--card);color:var(--fg);box-shadow:var(--sh1);font-weight:600}
.vt:hover:not(.on){color:var(--fg)}

/* Tab Reais/Unidades */
.tt{display:flex;align-items:center;gap:.5rem;padding:.6rem 1.15rem;border-radius:.7rem;font-weight:600;font-size:.85rem;border:1.5px solid var(--brd);color:var(--mfg);background:var(--card)}
.tt:hover:not(:disabled){border-color:var(--p);color:var(--p)}
.tt.onr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-color:transparent;box-shadow:var(--shp)}
.tt.onu{background:linear-gradient(135deg,var(--s),hsl(160,58%,38%));color:#fff;border-color:transparent;box-shadow:var(--shs)}
.tt:disabled{opacity:.38;cursor:not-allowed}
.tt svg{width:.95rem;height:.95rem;flex-shrink:0}

/* Seg nav */
.seg{display:flex;background:var(--surf);border-radius:.7rem;padding:.22rem;gap:.18rem}
.sb2{padding:.48rem 1rem;border-radius:.5rem;font-size:.76rem;font-weight:600;color:var(--mfg);white-space:nowrap;display:flex;align-items:center;gap:.32rem}
.sb2.on{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:var(--shp)}
.sb2:hover:not(.on){color:var(--fg)}
.sb2 svg{width:.8rem;height:.8rem}
/* ─────────────────────── CARDS ─────────────────────── */
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:1.2rem;box-shadow:var(--sh1);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--sh2)}
.cardh:hover{transform:translateY(-3px)}

/* KPI */
.kpi{border-radius:var(--r);padding:1.2rem;border:1px solid var(--brd);background:var(--card);position:relative;overflow:hidden;box-shadow:var(--sh1);transition:all .2s}
.kpi:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;right:0;width:5rem;height:5rem;border-radius:50%;opacity:.07;transform:translate(30%,-30%)}
.kpi.ks{border-color:hsla(142,64%,34%,.22);background:linear-gradient(135deg,var(--card),var(--sl))}.kpi.ks::before{background:var(--s)}
.kpi.kw{border-color:hsla(38,90%,44%,.22);background:linear-gradient(135deg,var(--card),var(--wl))}.kpi.kw::before{background:var(--w)}
.kpi.kd{border-color:hsla(4,82%,47%,.22);background:linear-gradient(135deg,var(--card),var(--dl))}.kpi.kd::before{background:var(--d)}
.kl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mfg)}
.kv{font-size:1.7rem;font-weight:800;margin:.38rem 0 0;line-height:1;letter-spacing:-.02em}
.ks2{font-size:.65rem;color:var(--mfg);margin-top:.3rem}
.kbar{height:.22rem;background:var(--muted);border-radius:2px;margin-top:.7rem;overflow:hidden}
.kbf{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}

/* ─────────────────────── UPLOAD GRID ─────────────────────── */
.upload-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem}
@media(max-width:700px){.upload-grid{grid-template-columns:1fr}}
.upload-group{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh1)}
.upload-group-hd{padding:.75rem 1.1rem;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:.5rem}
.upload-group-hd svg{width:.95rem;height:.95rem}
.upload-group-hd h3{font-size:.78rem;font-weight:700;letter-spacing:.01em}
.upload-group-body{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:none}
.uz{position:relative;cursor:pointer;padding:1.25rem 1rem;text-align:center;transition:all .22s;background:var(--card);border-right:1px solid var(--brd)}
.uz:last-child{border-right:none}
.uz:hover{background:color-mix(in srgb,var(--p) 4%,var(--card))}
.uz.done{background:var(--sl)}
.uz input[type=file]{display:none}
.uz-lbl{font-size:.7rem;font-weight:600;color:var(--mfg);margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.3rem}
.uz-lbl.val{color:var(--p)}.uz-lbl.uni{color:var(--s)}
.uz-ico{width:2.4rem;height:2.4rem;border-radius:.6rem;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .2s}
.uz-ico.val{background:hsla(224,71%,50%,.1);color:var(--p)}
.uz-ico.uni{background:var(--sl);color:var(--s)}
.uz-ico svg{width:1.1rem;height:1.1rem}
.uz.done .uz-ico{background:var(--sl);color:var(--s)}
.uz-fname{font-size:.6rem;font-family:'Geist Mono',monospace;color:var(--s);margin-top:.28rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
.uz-hint{font-size:.6rem;color:var(--mfg);opacity:.6;margin-top:.3rem}
/* progress dots */
.prog-dots{display:flex;gap:.3rem;justify-content:center;padding:.5rem 1.1rem;border-top:1px solid var(--brd)}
.pdot{width:.45rem;height:.45rem;border-radius:50%;background:var(--muted);transition:background .2s}
.pdot.on{background:var(--s)}

/* ─────────────────────── REP CARD ─────────────────────── */
.rc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:1.2rem;box-shadow:var(--sh1);transition:all .22s;position:relative;overflow:hidden}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.rc.rbl::before{background:linear-gradient(180deg,var(--s),hsl(160,58%,48%))}
.rc.rat::before{background:linear-gradient(180deg,var(--d),hsl(4,82%,58%))}
.rc:hover{box-shadow:var(--sh3);transform:translateY(-3px)}
.rnk{width:1.6rem;height:1.6rem;border-radius:.45rem;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0}
.rnk.gold{background:linear-gradient(135deg,hsl(42,95%,55%),hsl(35,95%,45%));color:#fff;box-shadow:0 3px 10px hsla(42,95%,50%,.48)}
.rnk.silver{background:linear-gradient(135deg,hsl(220,18%,68%),hsl(220,14%,54%));color:#fff}
.rnk.bronze{background:linear-gradient(135deg,hsl(25,62%,53%),hsl(25,62%,42%));color:#fff}
.rnk.other{background:var(--surf);color:var(--mfg)}
.ctr{height:.4rem;background:var(--muted);border-radius:4px;overflow:hidden;margin:.45rem 0}
.ctf{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.ms{background:var(--surf);border-radius:.45rem;padding:.45rem .6rem}
.msl{font-size:.58rem;color:var(--mfg)}.msv{font-size:.75rem;font-weight:700;margin-top:.08rem}

/* ─────────────────────── TABLES ─────────────────────── */
.tw{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh1)}
table{width:100%;border-collapse:collapse;font-size:.7rem}
thead tr{background:var(--surf);border-bottom:1px solid var(--brd)}
th{padding:.7rem .95rem;color:var(--mfg);font-weight:600;font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
th.r,td.r{text-align:right}th.c,td.c{text-align:center}
td{padding:.7rem .95rem;border-bottom:1px solid color-mix(in srgb,var(--brd) 50%,transparent);transition:background .1s}
tr:last-child td{border-bottom:none}
tr:hover td{background:color-mix(in srgb,var(--p) 4%,transparent)}

/* ─────────────────────── AUTH ─────────────────────── */
.authp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:radial-gradient(ellipse at 60% 40%,color-mix(in srgb,var(--p) 8%,transparent),transparent 70%)}
.authb{width:100%;max-width:374px;background:var(--card);border:1px solid var(--brd);border-radius:1.2rem;padding:1.9rem;box-shadow:var(--sh3)}
.alogo{width:3.2rem;height:3.2rem;border-radius:.9rem;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;box-shadow:var(--shp)}
.alogo svg{width:1.5rem;height:1.5rem;color:#fff}
.ifw{position:relative}.ifw svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);width:.95rem;height:.95rem;color:var(--mfg);pointer-events:none}
.ifw input{width:100%;padding:.62rem .95rem .62rem 2.3rem;border-radius:.6rem;border:1.5px solid var(--brd);background:var(--bg);color:var(--fg);font-size:.85rem;transition:border-color .14s,box-shadow .14s}
.ifw input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px var(--pg)}
.alinks{text-align:center;font-size:.7rem;color:var(--mfg)}
.alinks button{font-size:.7rem;color:var(--p);font-weight:600;text-decoration:underline;text-decoration-color:transparent}
.alinks button:hover{text-decoration-color:currentColor}

/* ─────────────────────── CHART ─────────────────────── */
.cc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:1.4rem;box-shadow:var(--sh1)}
.ct{font-size:.95rem;font-weight:700;margin-bottom:.2rem;letter-spacing:-.01em}
.cs{font-size:.7rem;color:var(--mfg);margin-bottom:1.1rem;display:flex;flex-wrap:wrap;align-items:center;gap:.45rem}
.dot{display:inline-block;width:.52rem;height:.52rem;border-radius:50%}

/* ─────────────────────── PRIORITY ─────────────────────── */
.pr{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid color-mix(in srgb,var(--brd) 50%,transparent)}
.pr:last-child{border-bottom:none}

/* ─────────────────────── TOAST ─────────────────────── */
#tw{position:fixed;bottom:1.4rem;right:1.4rem;z-index:9999;display:flex;flex-direction:column;gap:.45rem;pointer-events:none}
.toast{pointer-events:all;background:var(--card);border:1.5px solid var(--brd);border-radius:.7rem;padding:.7rem .95rem;font-size:.78rem;font-weight:500;min-width:230px;max-width:330px;box-shadow:var(--sh3);display:flex;align-items:center;gap:.45rem;animation:tIn .22s ease}
.toast.success{border-color:var(--s);color:var(--s)}
.toast.error{border-color:var(--d);color:var(--d)}
@keyframes tIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{to{opacity:0;transform:translateX(18px)}}

/* ─────────────────────── MISC ─────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:.95rem;height:.95rem;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .32s ease}
.divv{width:1px;height:1.4rem;background:var(--brd)}
.ts{color:var(--s)}.td{color:var(--d)}.tw2{color:var(--w)}.tm{color:var(--mfg)}
.fw8{font-weight:800}.fw7{font-weight:700}.fw6{font-weight:600}
.hero{text-align:center;margin-bottom:2.25rem}
.hico{width:4.5rem;height:4.5rem;border-radius:1.3rem;background:linear-gradient(135deg,var(--p),var(--p2),var(--p3));display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;box-shadow:var(--shp),0 0 50px var(--pg)}
.hico svg{width:2.1rem;height:2.1rem;color:#fff}
.hero h2{font-size:1.85rem;font-weight:800;letter-spacing:-.025em}
.hero p{font-size:.85rem;color:var(--mfg);margin-top:.45rem;max-width:430px;margin-left:auto;margin-right:auto}
.ldf{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:.7rem;font-size:.875rem;color:var(--mfg)}
.dh{border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.dh summary{padding:.7rem 1.1rem;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mfg);cursor:pointer;list-style:none;display:flex;align-items:center;gap:.45rem}
.dh .db{padding:.7rem 1.1rem .95rem;font-size:.65rem;color:var(--mfg);font-family:'Geist Mono',monospace;line-height:1.8}
.eb{font-size:.73rem;color:var(--d);background:var(--dl);border:1px solid hsla(4,82%,47%,.18);border-radius:.6rem;padding:.58rem .95rem;text-align:center}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}

/* ══════════════════════════

const fc=v=>{const a=Math.abs(v);if(a>=1e6)return`R$ ${(v/1e6).toFixed(1)}M`;if(a>=1000)return`R$ ${(v/1000).toFixed(1)}k`;return`R$ ${v.toFixed(0)}`};
const fn=v=>new Intl.NumberFormat('pt-BR').format(Math.round(v));

/* ══════════════════════════
   EXCEL HELPERS
══════════════════════════ */
function nrm(n){return String(n).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[_\s.]+/g,' ').trim()}
function fCol(row,names){
  const ks=Object.keys(row),ns=names.map(nrm);
  for(const n of ns)for(const k of ks)if(nrm(k)===n)return row[k];
  for(const n of ns)for(const k of ks)if(nrm(k).includes(n))return row[k];
  return undefined;
}
function toN(v){
  if(v===null||v===undefined||v==='')return 0;
  if(typeof v==='number')return isNaN(v)?0:v;
  let s=String(v).trim().replace(/[¤$€£¥\s]/g,'');
  const lc=s.lastIndexOf(','),ld=s.lastIndexOf('.');
  if(lc>ld)s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');
  const p=parseFloat(s);return isNaN(p)?0:p;
}
function exBase(row){
  return{
    realAA:toN(fCol(row,['REAL. AA','REAL AA'])),
    cota:toN(fCol(row,['COTA','cota'])),
    realizado:toN(fCol(row,['REALIZADO','realizado'])),
    cobReal:toN(fCol(row,['COB. REAL','COB REAL'])),
    crescAtual:toN(fCol(row,['CRESC. ATUAL'])),
    projArred:toN(fCol(row,['PROJ. ARRED','PROJ ARRED'])),
    cobProjArred:toN(fCol(row,['COB. PROJ. ARRED','COB PROJ ARRED'])),
    crescProj:toN(fCol(row,['CRESC. PROJ.'])),
    repres:toN(fCol(row,['%Repres.'])),
    deltaCota:toN(fCol(row,['Δ Cota Vs Dem. Proj','Δ  Cota Vs Dem. Proj','Delta Cota','DELTA'])),
    difRealizadoCota:toN(fCol(row,['Diferença Realizado x Cota'])),
  };
}

/* ── Parse Família sheet ── */
function parseFamSheet(wb){
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(sheet,{defval:0});
  const rows=[];let curFam='';
  for(const row of raw){
    const fv=String(Object.values(row)[0]??'');
    if(fv.toLowerCase().includes('filtros')||fv.toLowerCase().includes('meses é'))continue;
    const fam=String(fCol(row,['FAMILIA','familia'])??'').trim();
    const prod=String(fCol(row,['NM_FAMILIA_PP','nm familia pp','produto'])??'').trim();
    if(fam&&!fam.toLowerCase().includes('total'))curFam=fam;
    if(!prod)continue;
    const ext={...exBase(row),familia:curFam,produto:prod};
    if(prod.toLowerCase()==='total'){ext.produto='__TOTAL__';}
    else if(ext.cota===0)continue;
    rows.push(ext);
  }
  return rows;
}

/* ── Parse Representante sheet ── */
function parseRepSheet(wb){
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(sheet,{defval:0});
  const reps=[];
  for(const row of raw){
    const terr=String(fCol(row,['TERRITORIO','territorio'])??'').trim();
    if(!terr||terr.toLowerCase()==='total'||terr.toLowerCase().includes('filtros'))continue;
    const cota=toN(fCol(row,['COTA','cota']));if(cota===0)continue;
    let code='',name=terr;const m=terr.match(/^(\d+)\s*-\s*(.+)$/);if(m){code=m[1];name=m[2].trim()}
    reps.push({...exBase(row),codigo:code,nome:name,territorio:terr});
  }
  reps.sort((a,b)=>b.cobProjArred-a.cobProjArred);
  return reps;
}

/* ── Merge & build dashboard data ── */
function buildDashData(famV,famU,repV,repU){
  // ── FAMÍLIA ──
  let famData=null;
  if(famV){
    const vRows=parseFamSheet(famV),uRows=famU?parseFamSheet(famU):null;
    const vP=vRows.filter(r=>r.produto!=='__TOTAL__'),uP=uRows?uRows.filter(r=>r.produto!=='__TOTAL__'):[];
    const fams=new Set(vRows.filter(r=>r.produto==='__TOTAL__').map(r=>r.familia));
    const summaries=[];
    for(const fam of fams){
      const vt=vRows.find(r=>r.familia===fam&&r.produto==='__TOTAL__');
      const ut=uRows?uRows.find(r=>r.familia===fam&&r.produto==='__TOTAL__'):null;
      if(!vt)continue;
      const fvp=vRows.filter(r=>r.familia===fam&&r.produto!=='__TOTAL__');
      const fup=uRows?uRows.filter(r=>r.familia===fam&&r.produto!=='__TOTAL__'):[];
      const prods=fvp.map(vp=>{
        const up=fup.find(u=>u.produto===vp.produto)||null;
        return{nome:vp.produto.replace(/_$/,'').replace(/ HYQ$/,'').trim(),valor:vp,unidades:up,status:vp.deltaCota>=0?'blindar':'atuar'};
      });
      summaries.push({familia:fam,valor:vt,unidades:ut,produtos:prods,status:vt.deltaCota>=0?'blindar':'atuar'});
    }
    summaries.sort((a,b)=>{if(a.status==='atuar'&&b.status==='blindar')return-1;if(a.status==='blindar'&&b.status==='atuar')return 1;return a.valor.deltaCota-b.valor.deltaCota});
    const tV=sumArr(summaries.map(s=>s.valor));
    const tU=uRows?sumArr(summaries.filter(s=>s.unidades).map(s=>s.unidades)):null;
    famData={familias:summaries,valorRows:vP,unidadesRows:uP,totalValor:tV,totalUnidades:tU,hasUnidades:!!uRows};
  }
  // ── REPRESENTANTE ──
  let repData=null;
  if(repV){
    const vR=parseRepSheet(repV),uR=repU?parseRepSheet(repU):null;
    const reps=vR.map(vr=>{const ur=uR?uR.find(r=>r.codigo===vr.codigo):null;return{...vr,uni:ur||null};});
    const tV=sumArr(vR);const tU=uR?sumArr(uR):null;
    tV.cobProjArred=tV.cota>0?tV.projArred/tV.cota:0;
    if(tU)tU.cobProjArred=tU.cota>0?tU.projArred/tU.cota:0;
    repData={reps,totalValor:tV,totalUnidades:tU,hasUnidades:!!uR};
  }
  return{famData,repData};
}
function sumArr(arr){
  const t={cota:0,realizado:0,projArred:0,deltaCota:0,cobProjArred:0};
  arr.forEach(r=>{if(!r)return;t.cota+=r.cota||0;t.realizado+=r.realizado||0;t.projArred+=r.projArred||0;t.deltaCota+=r.deltaCota||0;});
  t.cobProjArred=t.cota>0?t.projArred/t.cota:0;
  return t;
}

function uzSlot(key,label,type,file,hint){
  return`<div class="uz ${file?'done':''}" onclick="document.getElementById('fi-${key}').click()" ondrop="onDrop(event,'${key}')" ondragover="event.preventDefault()">
    <input type="file" id="fi-${key}" accept=".xlsx,.xls" style="display:none" onchange="onFile(event,'${key}')"/>
    <div class="uz-ico ${type}">${file?ic('chk',18):ic(type==='val'?'dol':'pkg',18)}</div>
    <div class="uz-lbl ${type}">${label}</div>
    ${file?`<div class="uz-fname">${file.name}</div>`:`<div class="uz-hint">${hint.length>28?hint.slice(0,28)+'…':hint}</div>`}
    ${!file?`<div class="uz-hint" style="margin-top:.2rem;font-size:.55rem">${ic('upar',9)} clique ou arraste</div>`:''}
  </div>`;
}

function onDrop(e,key){e.preventDefault();const f=e.dataTransfer.files[0];if(f&&(f.name.endsWith('.xlsx')||f.name.endsWith('.xls'))){files[key]=f;render()}}
function onFile(e,key){const f=e.target.files?.[0];if(f){files[key]=f;render()}}

async function doProc(){
  const{famV,famU,repV,repU}=files;
  if(!famV&&!repV)return;
  loading=true;err=null;render();
  try{
    async function readBuf(f){return f?f.arrayBuffer():null}
    const[bFV,bFU,bRV,bRU]=await Promise.all([readBuf(famV),readBuf(famU),readBuf(repV),readBuf(repU)]);
    const wFV=bFV?XLSX.read(bFV,{type:'array'}):null;
    const wFU=bFU?XLSX.read(bFU,{type:'array'}):null;
    const wRV=bRV?XLSX.read(bRV,{type:'array'}):null;
    const wRU=bRU?XLSX.read(bRU,{type:'array'}):null;
    dashData=buildDashData(wFV,wFU,wRV,wRU);
    // auto-select section
    if(dashData.famData&&!dashData.repData)section='produto';
    else if(!dashData.famData&&dashData.repData)section='rep';
    else section='produto';
    try{await saveDash(dashData);toast('Análise salva na nuvem!','success')}
    catch{toast('Processado — erro ao salvar na nuvem.','error')}
  }catch(e){err='Erro ao processar arquivos. Verifique o formato.';console.error(e);toast('Erro ao processar','error')}
  finally{loading=false;render()}
}

function kpi(title,val,sub,type='',pct=0,bar=false){
  const cls={success:'ks',warning:'kw',danger:'kd','':''}[type]||'';
  const tc={success:'var(--s)',warning:'var(--w)',danger:'var(--d)','':'var(--fg)'}[type]||'var(--fg)';
  const bc={success:'var(--s)',warning:'var(--w)',danger:'var(--d)','':'var(--p)'}[type]||'var(--p)';
  return`<div class="kpi ${cls}">
    <div class="kl">${title}</div>
    <div class="kv mono ${type==='danger'?'pulse':''}" style="color:${tc}">${val}</div>
    ${sub?`<div class="ks2 mono">${sub}</div>`:''}
    ${bar?`<div class="kbar"><div class="kbf" style="width:${Math.min(pct*100,100)}%;background:${bc}"></div></div>`:''}
  </div>`;
}

      ${kpi('Cota Total',fmt(totals.cota),'Meta do período','',0)}

function rFamCards(fd,isR,fmt){
  const sC=c=>c>=1?'hsl(142,64%,36%)':c>=.7?'hsl(38,90%,44%)':'hsl(4,82%,48%)';

    const d=isR?s.valor:s.unidades||s.valor;

      <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--mfg);margin-bottom:.22rem"><span>Cobertura Projetada</span><span class="mono fw8" style="color:${sc}">${pP.toFixed(1)}%</span></div>
      <div style="height:.38rem;background:var(--muted);border-radius:3px;overflow:hidden;margin-bottom:.8rem"><div style="height:100%;border-radius:3px;background:${sc};width:${Math.min(pP,100)}%;transition:width .6s ease"></div></div>
      <div class="g2 gap2" style="display:grid;font-size:.7rem">

        <div class="ms"><div class="msl">Δ Cota</div><div class="msv mono" style="color:${d.deltaCota>=0?'var(--s)':'var(--d)'}">${d.deltaCota>=0?'+':''}${fmt(d.deltaCota)}</div><div style="font-size:.6rem;color:var(--mfg)">vs dem. proj.</div></div>
      </div>
      <p style="font-size:.62rem;color:var(--mfg);margin-top:.6rem">${s.produtos.length} produto${s.produtos.length!==1?'s':''}</p>

function rProdTbl(rows,isR){
  const sorted=[...rows].sort((a,b)=>a.cobProjArred-b.cobProjArred);
  const fmt=v=>fmtV(v,isR);
  const FC={'FOCO 1':'hsl(239,82%,65%)','FOCO 2':'hsl(38,90%,44%)','FOCO 3':'hsl(160,64%,36%)','DEMAIS PRODUTOS':'hsl(215,14%,55%)','LANCAMENTO':'hsl(330,78%,58%)'};
  const sc=c=>c>=1?'var(--s)':c>=.7?'var(--w)':'var(--d)';
  return`<div class="tw ox"><table>
    <thead><tr><th>Família</th><th>Produto</th><th class="r">Cota</th><th class="r">Realizado</th><th class="r">Cob. Real</th><th class="r">Projeção</th><th class="r">Cob. Proj.</th><th class="r">Δ Cota</th><th class="c">Status</th></tr></thead>
    <tbody>${sorted.map(row=>{
      const fc2=FC[row.familia]||'hsl(215,14%,55%)';
      return`<tr>
        <td><span style="padding:.1rem .45rem;border-radius:999px;font-size:.58rem;font-weight:600;background:${fc2}1a;color:${fc2}">${row.familia}</span></td>

        <td class="r mono fw6">${fmt(row.realizado)}</td>
        <td class="r mono">${fp(row.cobReal)}</td>
        <td class="r mono" style="color:var(--mfg)">${fmt(row.projArred)}</td>
        <td class="r mono fw8" style="color:${sc(row.cobProjArred)}">${fp(row.cobProjArred)}</td>
        <td class="r"><span class="mono fw6" style="color:${row.deltaCota>=0?'var(--s)':'var(--d)'}">${row.deltaCota>=0?'+':''}${fmt(row.deltaCota)}</span></td>
        <td class="c" style="font-size:.62rem;font-weight:700;color:${sc(row.cobProjArred)}">${row.cobProjArred>=1?'✅':row.cobProjArred>=.7?'⚠️':'🚨'}</td>

function rDeltaChart(rows){return`<div class="cc"><div class="ct">Δ Cota vs Demanda Projetada</div><div class="cs"><span class="dot" style="background:hsl(142,64%,38%)"></span>Positivo = supera <span style="margin:0 .4rem">|</span><span class="dot" style="background:hsl(4,82%,50%)"></span>Negativo = abaixo</div><div id="ch-delta" style="height:${Math.max(300,rows.length*30)}px"></div></div>`}

/* ══════════════════════════
   REP SECTION
══════════════════════════ */
function rRepSec(){
  const rd=dashData.repData;if(!rd)return'<div style="color:var(--mfg);text-align:center;padding:3rem">Nenhum dado de representante carregado.</div>';
  const isR=tab==='reais';
  const reps=rd.reps;
  const totals=isR?rd.totalValor:rd.totalUnidades||rd.totalValor;
  const fmt=v=>fmtV(v,isR);
  const getCob=r=>isR?r.cobProjArred:r.uni?.cobProjArred||r.cobProjArred;
  const urg=reps.filter(r=>getCob(r)<0.7).length;

  return`<div class="sy">
    <div class="g4 gap4" style="display:grid">

      ${kpi('Projeção',fmt(totals.projArred),`Cob. ${fp(totals.cobProjArred)}`,totals.cobProjArred>=1?'success':'warning',Math.min(totals.cobProjArred,1.5),true)}
      ${kpi('Alertas',`${urg} urgentes`,`${bat} acima da meta`,urg>0?'danger':'success')}

    ${rPodium(reps,isR,fmt,getCob)}

      <h3 style="font-size:.88rem;font-weight:700;margin-bottom:.8rem;display:flex;align-items:center;gap:.45rem">${ic('users',15)} Ranking Completo</h3>
      <div class="g3 gap4" style="display:grid">${reps.map((r,i)=>rRepCard(r,i,isR,fmt,getCob)).join('')}</div>
    </div>
    <div>
      <h3 style="font-size:.88rem;font-weight:700;margin-bottom:.8rem;display:flex;align-items:center;gap:.45rem">${ic('bars',15)} Tabela Comparativa</h3>
      ${rRepTbl(reps,isR,fmt,getCob)}
    </div>
    <div class="g2 gap4" style="display:grid">
      <div class="cc"><div class="ct">Cobertura Projetada</div><div class="cs"><span class="dot" style="background:hsl(142,64%,38%)"></span>≥100% <span style="margin:0 .4rem">|</span><span class="dot" style="background:hsl(38,90%,46%)"></span>70-99% <span style="margin:0 .4rem">|</span><span class="dot" style="background:hsl(4,82%,50%)"></span>&lt;70%</div><div id="rep-cob" style="height:${Math.max(260,reps.length*32)}px"></div></div>
      <div class="cc"><div class="ct">Δ Cota vs Demanda Proj.</div><div class="cs"><span class="dot" style="background:hsl(142,64%,38%)"></span>Positivo <span style="margin:0 .4rem">|</span><span class="dot" style="background:hsl(4,82%,50%)"></span>Negativo</div><div id="rep-delta" style="height:${Math.max(260,reps.length*32)}px"></div></div>

function rPodium(reps,isR,fmt,getCob){
  if(!reps.length)return'';
  const sorted=[...reps].sort((a,b)=>getCob(b)-getCob(a));
  const top=sorted.slice(0,Math.min(3,sorted.length));
  const emo=['🥇','🥈','🥉'],rnks=['gold','silver','bronze'];
  return`<div style="background:linear-gradient(135deg,var(--card),var(--surf));border:1px solid var(--brd);border-radius:var(--r);padding:1.4rem;box-shadow:var(--sh1)">
    <h3 style="font-size:.88rem;font-weight:700;margin-bottom:1.1rem;display:flex;align-items:center;gap:.45rem">${ic('medal',15,'ts')} Top Representantes</h3>
    <div class="g3 gap3" style="display:grid">
    ${top.map((r,i)=>{
      const cob=getCob(r);
      const getDelta=r=>isR?r.deltaCota:r.uni?.deltaCota??r.deltaCota;
      const delta=getDelta(r);
      return`<div style="background:var(--card);border:1px solid ${i===0?'hsla(42,95%,50%,.38)':'var(--brd)'};border-radius:var(--rsm);padding:.95rem;text-align:center;position:relative;${i===0?'box-shadow:0 4px 18px hsla(42,95%,50%,.18)':''}">
        <div style="position:absolute;top:.4rem;right:.4rem;font-size:1rem">${emo[i]}</div>
        <div class="rnk ${rnks[i]}" style="width:2.3rem;height:2.3rem;border-radius:.65rem;margin:0 auto .65rem;font-size:.8rem">${i+1}</div>
        <div style="font-size:.75rem;font-weight:700;margin-bottom:.45rem;line-height:1.3">${r.nome}</div>
        <div style="font-size:1.4rem;font-weight:800;color:var(--s);font-family:'Geist Mono',monospace;line-height:1">${fp(cob)}</div>
        <div style="font-size:.62rem;color:var(--mfg);margin:.25rem 0">Cob. Projetada</div>
        <div style="font-size:.68rem;font-weight:600;font-family:'Geist Mono',monospace;color:${delta>=0?'var(--s)':'var(--d)'}">Δ ${delta>=0?'+':''}${fmt(delta)}</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

function rRepCard(r,idx,isR,fmt,getCob){
  const cob=getCob(r);
  const real=isR?r.realizado:r.uni?.realizado??r.realizado;
  const cota=isR?r.cota:r.uni?.cota??r.cota;
  const proj=isR?r.projArred:r.uni?.projArred??r.projArred;
  const delta=isR?r.deltaCota:r.uni?.deltaCota??r.deltaCota;
  const sC=cob>=1?'var(--s)':cob>=.7?'var(--w)':'var(--d)';
  const sL=cob>=1?'✅ Batendo':cob>=.7?'⚠️ Atenção':'🚨 Atuar';
  const rnk=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'other';
  return`<div class="rc ${delta>=0?'rbl':'rat'}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.8rem;gap:.45rem">
      <div style="display:flex;align-items:center;gap:.5rem;min-width:0">
        <div class="rnk ${rnk}">${idx+1}</div>
        <div style="min-width:0"><div style="font-size:.77rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.nome}</div>${r.codigo?`<div style="font-size:.6rem;color:var(--mfg);font-family:'Geist Mono',monospace">${r.codigo}</div>`:''}</div>
      </div>
      <span class="stbadge" style="background:${sC}1a;color:${sC}">${sL}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--mfg);margin-bottom:.28rem"><span>Cob. Projetada</span><span class="mono fw8" style="color:${sC}">${fp(cob)}</span></div>
    <div class="ctr"><div class="ctf" style="width:${Math.min(cob/1.5*100,100)}%;background:${sC}"></div></div>
    <div class="g2 gap2" style="display:grid;margin-top:.7rem">
      <div class="ms"><div class="msl">Realizado</div><div class="msv mono">${fmt(real)}</div><div style="font-size:.58rem;color:${cota>0&&real/cota>=1?'var(--s)':'var(--w)'}">${cota>0?((real/cota)*100).toFixed(1):0}% cota</div></div>
      <div class="ms"><div class="msl">Δ Cota</div><div class="msv mono" style="color:${delta>=0?'var(--s)':'var(--d)'}">${delta>=0?'+':''}${fmt(delta)}</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.7rem;padding:.45rem .6rem;background:var(--surf);border-radius:.4rem">
      <span style="font-size:.62rem;color:var(--mfg)">Projeção</span>
      <span class="mono fw7" style="font-size:.75rem">${fmt(proj)}</span>
    </div>
  </div>`;
}

function rRepTbl(reps,isR,fmt,getCob){
  const sorted=[...reps].sort((a,b)=>getCob(a)-getCob(b));
  const sc=c=>c>=1?'var(--s)':c>=.7?'var(--w)':'var(--d)';
  return`<div class="tw ox"><table>
    <thead><tr><th>#</th><th>Representante</th><th class="r">Cota</th><th class="r">Realizado</th><th class="r">Cob. Real</th><th class="r">Projeção</th><th class="r">Cob. Proj.</th><th class="r">Δ Cota</th><th class="c">Status</th></tr></thead>
    <tbody>${sorted.map((r,i)=>{
      const cob=getCob(r);
      const real=isR?r.realizado:r.uni?.realizado??r.realizado;
      const cota=isR?r.cota:r.uni?.cota??r.cota;
      const proj=isR?r.projArred:r.uni?.projArred??r.projArred;
      const cobR=isR?r.cobReal:r.uni?.cobReal??r.cobReal;
      const delta=isR?r.deltaCota:r.uni?.deltaCota??r.deltaCota;
      return`<tr>
        <td style="color:var(--mfg);font-size:.7rem">${sorted.length-i}</td>
        <td><div style="font-weight:600;font-size:.75rem">${r.nome}</div>${r.codigo?`<div style="font-size:.6rem;color:var(--mfg);font-family:'Geist Mono',monospace">${r.codigo}</div>`:''}</td>
        <td class="r mono" style="color:var(--mfg)">${fmt(cota)}</td>
        <td class="r mono fw6">${fmt(real)}</td>
        <td class="r mono">${fp(cobR)}</td>
        <td class="r mono" style="color:var(--mfg)">${fmt(proj)}</td>
        <td class="r mono fw8" style="color:${sc(cob)}">${fp(cob)}</td>
        <td class="r"><span class="mono fw6" style="color:${delta>=0?'var(--s)':'var(--d)'}">${delta>=0?'+':''}${fmt(delta)}</span></td>
        <td class="c" style="font-size:.62rem;font-weight:700;color:${sc(cob)}">${cob>=1?'✅ Batendo':cob>=.7?'⚠️ Atenção':'🚨 Atuar'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

/* ══════════════════════════
   PRIORITY PANEL
══════════════════════════ */
function rPriority(items,type,getCob){
  const _cob=r=>type==='rep'?(getCob?getCob(r):r.cobProjArred):r.cobProjArred;
  const _nm=r=>type==='rep'?r.nome:(r.produto?r.produto.replace(/ MF_/,'').replace(/ HYQ/,'').replace(/_$/,''):r.familia||'');
  const _sub=r=>type==='rep'?(r.codigo||''):(r.familia||'');
  const worst=[...items].sort((a,b)=>_cob(a)-_cob(b)).slice(0,5);
  const best=[...items].sort((a,b)=>_cob(b)-_cob(a)).slice(0,5);
  const row=(r,good)=>`<div class="pr"><div><div style="font-size:.78rem;font-weight:600">${_nm(r)}</div><div style="font-size:.65rem;color:var(--mfg)">${_sub(r)}</div></div><span class="mono fw8" style="color:${good?'var(--s)':'var(--d)'}">${fp(_cob(r))}</span></div>`;
  return`<div class="g2 gap4" style="display:grid">
    <div class="card" style="border-color:hsla(4,82%,47%,.28)">
      <h3 style="font-size:.84rem;font-weight:700;color:var(--d);display:flex;align-items:center;gap:.45rem;margin-bottom:.8rem">${ic('alert',14)} Atuar Urgente</h3>
      ${worst.map(r=>row(r,false)).join('')}
    </div>
    <div class="card" style="border-color:hsla(142,64%,34%,.28)">
      <h3 style="font-size:.84rem;font-weight:700;color:var(--s);display:flex;align-items:center;gap:.45rem;margin-bottom:.8rem">${ic('shield',14)} Blindar — Top</h3>
      ${best.map(r=>row(r,true)).join('')}
    </div>
  </div>`;
}

/* ══════════════════════════
   RECHARTS
══════════════════════════ */
function mountCharts(){
  const{BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine,Cell,LabelList}=Recharts;
  function mkChart(id,data,dk,refX,ttFmt,lblFmt){
    const el=document.getElementById(id);if(!el||!data.length)return;
    const lbl=props=>{
      const{x,y,width,height,index}=props;const e=data[index];if(!e)return null;
      const isP=e[dk]>=0;
      return React.createElement('text',{x:isP?x+width+5:x+width-5,y:y+height/2,fill:'var(--fg)',fontSize:10,fontWeight:700,textAnchor:isP?'start':'end',dominantBaseline:'middle'},lblFmt(e));
    };
    ReactDOM.render(
      React.createElement(ResponsiveContainer,{width:'100%',height:'100%'},
        React.createElement(BarChart,{data,layout:'vertical',margin:{left:8,right:72}},
          React.createElement(CartesianGrid,{strokeDasharray:'3 3',horizontal:false,stroke:'var(--cgrid)',opacity:.5}),
          React.createElement(XAxis,{type:'number',tick:{fontSize:10,fill:'var(--ctxt)',fontWeight:500},axisLine:{stroke:'var(--cgrid)'},tickLine:{stroke:'var(--cgrid)'}}),
          React.createElement(YAxis,{type:'category',dataKey:'name',tick:{fontSize:10,fill:'var(--ctxt)',fontWeight:500},width:140,axisLine:false,tickLine:false}),
          React.createElement(Tooltip,{formatter:ttFmt,contentStyle:{background:'var(--card)',border:'1px solid var(--brd)',borderRadius:9,color:'var(--fg)',fontSize:11,fontWeight:600,padding:'9px 13px',boxShadow:'0 8px 28px rgba(0,0,0,.18)'}}),
          refX!==null?React.createElement(ReferenceLine,{x:refX,stroke:refX===0?'var(--fg)':'hsl(142,64%,40%)',strokeDasharray:refX===0?'':'4 4',strokeWidth:1.5,...(refX===100?{label:{value:'Meta 100%',position:'top',fontSize:10,fill:'hsl(142,64%,40%)',fontWeight:700}}:{})}):null,
          React.createElement(Bar,{dataKey:dk,radius:[0,4,4,0],barSize:17,name:''},
            ...data.map((e,i)=>React.createElement(Cell,{key:i,fill:e.fill})),
            React.createElement(LabelList,{content:lbl})
          )
        )
      ),el
    );
  }
  const isR=tab==='reais';
  // Prod charts
  if(section==='produto'&&dashData.famData){
    const rows=isR?dashData.famData.valorRows:dashData.famData.unidadesRows;
    if(document.getElementById('ch-cob')){
      const data=[...rows].sort((a,b)=>a.cobProjArred-b.cobProjArred).map(r=>({name:r.produto.replace(/ MF_/,'').replace(/ HYQ/,'').replace(/_$/,''),cobProj:parseFloat((r.cobProjArred*100).toFixed(1)),fill:r.cobProjArred>=1?'hsl(142,64%,40%)':r.cobProjArred>=.7?'hsl(38,90%,48%)':'hsl(4,82%,52%)'}));
      mkChart('ch-cob',data,'cobProj',100,v=>[`${v}%`,'Cob. Projetada'],e=>`${e.cobProj.toFixed(1)}%`);
    }
    if(document.getElementById('ch-delta')){
      const sorted=[...rows].sort((a,b)=>a.deltaCota-b.deltaCota);
      const mA=Math.max(...sorted.map(r=>Math.abs(r.deltaCota)),.001);
      const fV=v=>mA<=10?v.toFixed(2):Math.abs(v)>=1e6?`${(v/1e6).toFixed(1)}M`:Math.abs(v)>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0);
      const data=sorted.map(r=>({name:r.produto.replace(/ MF_/,'').replace(/ HYQ/,'').replace(/_$/,''),delta:parseFloat(r.deltaCota.toFixed(mA<=10?2:0)),fill:r.deltaCota>=0?'hsl(142,64%,40%)':'hsl(4,82%,52%)'}));
      mkChart('ch-delta',data,'delta',0,v=>[fV(v),'Δ Cota'],e=>fV(e.delta));
    }
  }
  // Rep charts
  if(section==='rep'&&dashData.repData){
    const reps=dashData.repData.reps;
    const getCob=r=>isR?r.cobProjArred:r.uni?.cobProjArred||r.cobProjArred;
    const getDelta=r=>isR?r.deltaCota:r.uni?.deltaCota??r.deltaCota;
    if(document.getElementById('rep-cob')){
      const data=[...reps].sort((a,b)=>getCob(a)-getCob(b)).map(r=>{const c=getCob(r);return{name:r.nome,cobProj:parseFloat((c*100).toFixed(1)),fill:c>=1?'hsl(142,64%,40%)':c>=.7?'hsl(38,90%,48%)':'hsl(4,82%,52%)'};});
      mkChart('rep-cob',data,'cobProj',100,v=>[`${v}%`,'Cob. Projetada'],e=>`${e.cobProj.toFixed(1)}%`);
    }
    if(document.getElementById('rep-delta')){
      const sorted=[...reps].sort((a,b)=>getDelta(a)-getDelta(b));
      const fV=v=>Math.abs(v)>=1e6?`${(v/1e6).toFixed(1)}M`:Math.abs(v)>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0);
      const data=sorted.map(r=>{const d=getDelta(r);return{name:r.nome,delta:parseFloat(d.toFixed(0)),fill:d>=0?'hsl(142,64%,40%)':'hsl(4,82%,52%)'};});
      mkChart('rep-delta',data,'delta',0,v=>[fV(v),'Δ Cota'],e=>fV(e.delta));
    }
  }
}

/* ══════════════════════════
   ACTIONS
══════════════════════════ */
function toggleTheme(){applyTheme(theme==='dark'?'light':'dark');render()}
async function doOut(){await sb.auth.signOut();me=null;dashData=null;render()}
function doNew(){dashData=null;files={famV:null,famU:null,repV:null,repU:null};err=null;render()}
function setTab(t){tab=t;render()}
function setView(v){view=v;render()}
function setSec(s){section=s;render()}
async function doSave(){
  if(!dashData||saving)return;saving=true;
  const btn=document.getElementById('bsv');if(btn){btn.disabled=true;btn.innerHTML=`<div class="sp"></div>`}
  try{await saveDash(dashData);toast('Análise salva!','success')}
  catch{toast('Erro ao salvar.','error')}
  finally{saving=false;if(btn){btn.disabled=false;btn.innerHTML=`${ic('save',13)} <span class="hm">Salvar</span>`}}
}
/* PDF — child-by-child to avoid giant canvas */
async function doPDF(){
  toast('Gerando PDF…','info',10000);
  try{
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const W=297,H=210,m=10;
    const el=document.getElementById('dm');if(!el)return;
    const kids=Array.from(el.children).filter(c=>c.offsetHeight>10);
    let first=true;
    for(const kid of kids){
      const canv=await html2canvas(kid,{scale:1.7,useCORS:true,allowTaint:true,backgroundColor:theme==='dark'?'#141820':'#f4f5f8',logging:false,imageTimeout:0});
      if(!first)pdf.addPage();first=false;
      const r=Math.min((W-m*2)/canv.width,(H-m*2)/canv.height);
      const dW=canv.width*r,dH=canv.height*r;
      pdf.addImage(canv.toDataURL('image/jpeg',.86),'JPEG',(W-dW)/2,(H-dH)/2,dW,dH);
    }
    pdf.save('analise-360.pdf');
    toast('PDF exportado!','success');
  }catch(e){console.error(e);toast('Erro: '+e.message,'error')}
}
async function doPNG(){
  const el=document.getElementById('dm');if(!el)return;
  toast('Gerando imagem…','info',8000);
  try{
    const canv=await html2canvas(el,{scale:2,useCORS:true,allowTaint:true,backgroundColor:theme==='dark'?'#141820':'#f4f5f8',logging:false,imageTimeout:0,windowWidth:1380});
    const a=document.createElement('a');a.download='analise-360.png';a.href=canv.toDataURL('image/png');a.click();
    toast('Imagem exportada!','success');
  }catch(e){console.error(e);toast('Erro: '+e.message,'error')}
}
</script>
